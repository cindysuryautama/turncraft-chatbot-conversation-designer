<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turncraft: Chatbot conversation designer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAF8;--surface:#F4F4F0;--fg:#1A1A1A;--fg-2:#4A4A4A;--fg-3:#8A8A86;--fg-4:#C0C0BB;
  --border:#EBEBE8;--border-2:#D4D4CF;--accent:#D4A017;--accent-deep:#8A6A0E;
  --accent-soft:rgba(212,160,23,0.12);--hover-tint:rgba(0,0,0,0.04);
  --r-sm:5px;--r-md:10px;--r-lg:16px;--r-pill:999px;
  --font-sans:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;
  --shadow-card:0 1px 3px rgba(0,0,0,0.05),0 4px 12px rgba(0,0,0,0.04);
  --shadow-hover:0 4px 16px rgba(0,0,0,0.09),0 12px 36px rgba(0,0,0,0.06);
  --dur:160ms;--ease:cubic-bezier(0.25,0,0.1,1);
  --status-high:#B91C1C;--status-good:#1a7a4a;--status-warn:#c05c00;
  --ph-bg:#0B0B0B;--ph-surface:#161616;--ph-surface-2:#1E1E1E;
  --ph-fg:#F0F0F0;--ph-fg-2:#A0A0A0;--ph-lime:#D966FF;
  --ph-red:#FF3B30;--ph-amber:#F59E0B;--ph-blue:#4A90D9;--ph-border:rgba(255,255,255,0.08);
}
body{font-family:var(--font-sans);background:var(--bg);color:var(--fg);height:100vh;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:400}.topbar--with-sub{height:64px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:28px;height:28px;border-radius:7px;background:var(--fg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:600;letter-spacing:-0.01em}.topbar-text-group{display:flex;flex-direction:column;gap:1px}.topbar-sub{font-size:11px;color:var(--text-secondary);font-weight:400;letter-spacing:0.01em}
.topbar-beta{font-size:10px;font-weight:500;font-family:var(--font-mono);background:var(--accent-soft);color:var(--accent-deep);padding:2px 7px;border-radius:var(--r-pill);letter-spacing:0.04em;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:8px}

/* Buttons */
.btn-ghost{background:none;border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 13px;font-size:12px;font-family:var(--font-sans);color:var(--fg-2);cursor:pointer;transition:all var(--dur) var(--ease);white-space:nowrap}
.btn-ghost:hover{background:var(--hover-tint);border-color:var(--border-2);color:var(--fg)}
.btn-primary{background:var(--fg);color:var(--bg);border:none;padding:8px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;font-family:var(--font-sans);cursor:pointer;transition:background var(--dur) var(--ease);width:100%}
.btn-primary:hover{background:#333}.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-outline{background:none;border:1px solid var(--border-2);padding:9px 20px;border-radius:var(--r-sm);font-size:13px;font-weight:500;font-family:var(--font-sans);color:var(--fg-2);cursor:pointer;transition:all var(--dur) var(--ease)}
.btn-outline:hover{border-color:var(--fg-3);color:var(--fg);background:var(--hover-tint)}
.btn-sm{background:var(--fg);color:var(--bg);border:none;padding:7px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:500;font-family:var(--font-sans);cursor:pointer;width:100%}
.btn-sm:disabled{opacity:.35;cursor:not-allowed}
.btn-accent-sm{font-size:11px;font-weight:500;font-family:var(--font-sans);background:var(--accent);color:#fff;border:none;padding:4px 11px;border-radius:var(--r-pill);cursor:pointer}
.btn-muted-sm{font-size:11px;color:var(--fg-3);background:none;border:none;cursor:pointer;font-family:var(--font-sans);padding:4px 0}
.btn-muted-sm:hover{color:var(--fg-2)}

/* Step bar */
.step-bar{display:flex;align-items:center;justify-content:center;gap:0;padding:10px 24px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.step-item{display:flex;align-items:center;gap:8px;position:relative;cursor:default}
.step-item[data-action]{cursor:pointer}
.step-item[data-action]:hover .step-dot{border-color:var(--fg-3)}
.step-item[data-action]:hover .step-label{color:var(--fg-2)}
.step-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:var(--font-mono);border:1.5px solid var(--border-2);background:var(--bg);color:var(--fg-3);transition:all var(--dur) var(--ease);flex-shrink:0}
.step-dot.active{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.step-dot.done{background:var(--accent);color:#fff;border-color:var(--accent);font-size:10px}
.step-label{font-size:12px;color:var(--fg-3);font-weight:500;white-space:nowrap}
.step-label.active{color:var(--fg)}
.step-connector{width:40px;height:1px;background:var(--border-2);margin:0 8px}

/* Main layout */
.main-layout{display:flex;flex:1;overflow:hidden}
.left-panel{width:300px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.left-panel-inner{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:20px}
.main-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.sec-label{font-size:10px;font-weight:600;font-family:var(--font-mono);color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}

/* Intent input */
.intent-textarea{width:100%;padding:10px 12px;border:1px solid var(--border-2);border-radius:var(--r-md);background:var(--bg);color:var(--fg);font-family:var(--font-sans);font-size:13px;line-height:1.5;resize:none;outline:none;transition:border-color var(--dur) var(--ease)}
.intent-textarea:focus{border-color:var(--fg-3)}
.intent-textarea::placeholder{color:var(--fg-4)}

/* Example chips */
.example-chip{width:100%;padding:7px 10px;border-radius:var(--r-sm);font-size:12px;color:var(--fg-2);cursor:pointer;transition:all var(--dur) var(--ease);text-align:left;background:transparent;border:1px solid transparent;display:flex;align-items:flex-start;gap:8px;font-family:var(--font-sans)}
.example-chip:hover{background:var(--bg);border-color:var(--border);color:var(--fg)}
.chip-id{font-family:var(--font-mono);font-size:10px;color:var(--accent);font-weight:500;flex-shrink:0;padding-top:1px}

/* Scenario cards */
.scenario-card{padding:10px 12px;border-radius:var(--r-md);background:var(--bg);border:1px solid var(--border);cursor:pointer;transition:all var(--dur) var(--ease)}
.scenario-card:hover{border-color:var(--border-2);box-shadow:var(--shadow-card)}
.scenario-card.active{background:var(--fg);border-color:var(--fg)}
.scenario-card-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.s-id{font-family:var(--font-mono);font-size:10px;font-weight:500;color:var(--accent);background:var(--accent-soft);padding:1px 6px;border-radius:var(--r-pill)}
.scenario-card.active .s-id{color:var(--accent);background:rgba(212,160,23,0.2)}
.s-badge{font-size:10px;font-weight:500;padding:1px 7px;border-radius:var(--r-pill);border:1px solid;white-space:nowrap}
.badge-happy{color:var(--status-good);border-color:#bbf7d0;background:#f0fdf4}
.badge-error{color:var(--status-high);border-color:#fecaca;background:#fef2f2}
.badge-edge{color:var(--status-warn);border-color:#fed7aa;background:#fff7ed}
.badge-empty{color:var(--fg-3);border-color:var(--border-2);background:var(--surface)}
.scenario-card.active .s-badge{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.28);color:rgba(255,255,255,0.85)}
.s-label{font-size:12px;font-weight:500;color:var(--fg);line-height:1.4}
.scenario-card.active .s-label{color:#fff}
.s-condition{font-size:11px;color:var(--fg-3);line-height:1.4;margin-top:3px}
.scenario-card.active .s-condition{color:rgba(255,255,255,0.55)}

/* Coverage signal */
.coverage-signal{padding:10px 12px;border-radius:var(--r-md);font-size:12px;color:var(--accent-deep);background:var(--accent-soft);border:1px dashed rgba(212,160,23,0.4);line-height:1.5}
.coverage-signal-actions{display:flex;gap:10px;margin-top:8px;align-items:center}

/* Intent strip */
.intent-strip{padding:9px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.strip-label{font-size:10px;font-weight:600;font-family:var(--font-mono);color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em;flex-shrink:0}
.strip-text{font-size:13px;color:var(--fg);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gov-pill{font-size:10px;color:var(--fg-3);background:var(--bg);border:1px solid var(--border);border-radius:var(--r-pill);padding:2px 9px;cursor:pointer;font-family:var(--font-mono);transition:all var(--dur) var(--ease);white-space:nowrap;flex-shrink:0}
.gov-pill:hover{border-color:var(--border-2);color:var(--fg-2)}

/* Empty state */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:32px}
.empty-copy{text-align:center;max-width:380px}
.empty-eyebrow{font-size:10px;font-weight:600;font-family:var(--font-mono);color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.empty-heading{font-size:22px;font-weight:600;letter-spacing:-0.02em;color:var(--fg);margin-bottom:10px;line-height:1.3}
.empty-sub{font-size:13px;color:var(--fg-2);line-height:1.65;margin-bottom:22px}
.empty-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* Step 2 */
.step2-wrap{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;min-height:0}
.step2-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.step2-heading{font-size:16px;font-weight:600;letter-spacing:-0.01em}
.step2-sub{font-size:12px;color:var(--fg-3);margin-top:3px}
.scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Step 3 layout */
.step3-layout{flex:1;display:flex;overflow:hidden}
.step3-main{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;align-items:center;gap:20px}
.step3-sidebar{width:268px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.step3-sidebar-inner{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}

/* Persona block */
.persona-block{width:100%;max-width:720px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg)}
.persona-header{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--border);user-select:none}
.persona-header-label{font-size:12px;font-weight:600;color:var(--fg-3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.07em;flex-shrink:0}
.chevron{font-size:9px;color:var(--fg-3);transition:transform var(--dur) var(--ease);line-height:1}
.chevron.open{transform:rotate(180deg)}
.persona-body{padding:14px;display:flex;flex-direction:column;gap:10px}
.persona-fields-row{display:flex;gap:12px;align-items:flex-start}
.persona-name-field{flex:0 0 190px}
.persona-text-field{flex:1}
.persona-field{display:flex;flex-direction:column;gap:5px}
.persona-field-label{font-size:10px;font-weight:600;font-family:var(--font-mono);color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em}
.persona-selector{display:flex;gap:6px}
.persona-opt{flex:1;padding:7px;border-radius:var(--r-sm);font-size:12px;font-family:var(--font-sans);font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--fg-2);transition:all var(--dur) var(--ease);text-align:center}
.persona-opt.active{border-color:var(--fg);background:var(--fg);color:var(--bg)}
.persona-dropdown{border:1px solid var(--border-2);border-radius:var(--r-sm);padding:5px 10px;font-size:12px;font-family:var(--font-sans);font-weight:500;color:var(--fg);background:var(--bg);cursor:pointer;outline:none;transition:border-color var(--dur) var(--ease);flex-shrink:0}
.persona-dropdown:focus{border-color:var(--fg-3)}
.persona-text{font-size:11.5px;color:var(--fg-2);line-height:1.65;padding:10px 12px;background:var(--surface);border-radius:var(--r-sm);border:1px solid var(--border);font-family:var(--font-mono)}

/* Phone */
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:720px}
.phone-scenario-header{align-self:stretch;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:11px 14px;display:flex;flex-direction:column;gap:4px}
.phone-scenario-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ph-scenario-id{font-family:var(--font-mono);font-weight:600;font-size:12px;color:var(--accent)}
.ph-scenario-title{font-size:13px;font-weight:600;color:var(--fg);letter-spacing:-0.01em}
.ph-scenario-condition{font-size:11.5px;color:var(--fg-3);line-height:1.5}
.phone-frame{width:300px;background:var(--ph-bg);border-radius:34px;border:7px solid #181818;box-shadow:0 0 0 1px #2a2a2a,0 20px 60px rgba(0,0,0,0.45);overflow:hidden}
.phone-notch{height:26px;background:#0B0B0B;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--ph-border)}
.phone-notch-pill{width:72px;height:9px;background:#1E1E1E;border-radius:999px}
.phone-header{padding:9px 13px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--ph-border);background:var(--ph-surface)}
.phone-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--ph-lime),#00a884);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;flex-shrink:0}
.phone-bot-name{font-size:11px;font-weight:600;color:var(--ph-fg)}
.phone-bot-status{font-size:9px;color:var(--ph-lime)}
.phone-body{padding:10px 9px;height:552px;overflow-y:auto;display:flex;flex-direction:column;gap:9px;background:var(--ph-bg)}

/* Chat components */
.chat-turn{display:flex;flex-direction:column;gap:4px}
.chat-turn.bot{align-items:flex-start}
.chat-turn.user{align-items:flex-end}
.bubble-bot{background:var(--ph-surface);color:var(--ph-fg);padding:7px 11px;border-radius:4px 14px 14px 14px;font-size:11.5px;line-height:1.5;max-width:205px}
.bubble-user{background:var(--ph-lime);color:var(--ph-user-text,#000);padding:7px 11px;border-radius:14px 14px 4px 14px;font-size:11.5px;font-weight:500;max-width:180px}
.bubble-wrap{position:relative;display:inline-flex}
.comp-wrap{position:relative;display:inline-flex;align-self:flex-start}
.item-remove-btn{display:none;position:absolute;top:-5px;right:-5px;width:15px;height:15px;border-radius:50%;border:none;background:rgba(220,38,38,0.9);color:#fff;font-size:9px;font-weight:700;cursor:pointer;padding:0;z-index:10;align-items:center;justify-content:center;line-height:1}
.bubble-wrap:hover .item-remove-btn,.comp-wrap:hover .item-remove-btn{display:flex}
.bubble-editable{cursor:text;outline:none;white-space:pre-wrap;word-break:break-word}
.bubble-editable:focus{outline:1.5px solid var(--ph-accent,#4ade80);outline-offset:2px;border-radius:3px}
.comp-editable{cursor:text;outline:none;min-width:4px}
.comp-editable:focus{background:rgba(0,0,0,0.06);border-radius:2px;outline:1px solid var(--ph-accent,#4ade80);outline-offset:1px}
.quick-replies{display:flex;flex-wrap:wrap;gap:5px;padding:2px 0}
.quick-reply{padding:4px 10px;border-radius:var(--r-pill);border:1px solid var(--ph-lime);color:var(--ph-lime);background:transparent;font-size:10.5px;font-family:var(--font-sans);white-space:nowrap;display:inline-block}
.quick-reply.primary{background:var(--ph-lime);color:var(--ph-lime-text,#000);border-color:var(--ph-lime)}

/* Metric card */
.metric-card{background:var(--ph-surface-2);border:1px solid var(--ph-border);border-radius:11px;padding:11px;max-width:205px;display:flex;flex-direction:column;gap:6px}
.metric-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.metric-label{font-size:10px;color:var(--ph-fg-2);font-family:var(--font-mono)}
.metric-value{font-size:21px;font-weight:700;color:var(--ph-fg);font-family:var(--font-mono);margin-bottom:2px}
.metric-meta{font-size:9.5px;color:var(--ph-fg-2)}
.btn-lime{width:100%;background:var(--ph-lime);color:var(--ph-lime-text,#000);border:none;padding:8px;border-radius:7px;font-size:11px;font-weight:700;font-family:var(--font-sans)}

/* Confirmation overlay */
.conf-overlay{background:var(--ph-surface);border:1px solid var(--ph-border);border-radius:11px;padding:11px;max-width:205px}
.conf-title{font-size:11px;font-weight:600;color:var(--ph-fg);margin-bottom:9px}
.conf-row{display:flex;justify-content:space-between;padding:3.5px 0;border-bottom:1px solid var(--ph-border)}
.conf-label{font-size:10.5px;color:var(--ph-fg-2)}.conf-value{font-size:10.5px;color:var(--ph-fg);font-weight:500}
.conf-actions{display:flex;gap:7px;margin-top:9px}
.btn-conf{flex:1;padding:7px 6px;border-radius:6px;font-size:10.5px;font-weight:700;font-family:var(--font-sans);border:none}
.btn-conf.confirm{background:var(--ph-lime);color:var(--ph-lime-text,#fff)}
.btn-conf.confirm.destructive{background:var(--ph-red);color:#fff}
.btn-conf.cancel{background:transparent;color:var(--ph-fg-2);border:1px solid var(--ph-border)}

/* Banners */
.banner{max-width:205px;border-radius:8px;padding:8px 10px;font-size:11px;line-height:1.5;display:flex;align-items:flex-start;gap:6px}
.banner-warning{background:rgba(245,158,11,0.14);border:1px solid rgba(245,158,11,0.28);color:var(--ph-amber)}
.banner-info{background:rgba(74,144,217,0.12);border:1px solid rgba(74,144,217,0.25);color:var(--ph-blue)}
.banner-success{background:rgba(26,122,74,0.15);border:1px solid rgba(26,122,74,0.3);color:#4ade80}
.banner-icon{font-size:12px;flex-shrink:0;line-height:1.5}

/* Record card */
.record-card{background:var(--ph-surface-2);border:1px solid var(--ph-border);border-radius:10px;padding:10px 11px;max-width:205px}
.record-card-head{display:flex;justify-content:space-between;margin-bottom:7px}
.record-id{font-size:9.5px;color:var(--ph-fg-2);font-family:var(--font-mono)}
.record-status{font-size:9.5px;color:var(--ph-lime);font-weight:600}
.record-primary{font-size:15px;font-weight:700;color:var(--ph-fg);margin-bottom:4px}
.record-row{display:flex;justify-content:space-between;padding:3.5px 0;border-bottom:1px solid var(--ph-border)}
.record-row:last-of-type{border-bottom:none}
.record-label{font-size:10px;color:var(--ph-fg-2)}.record-value{font-size:10px;color:var(--ph-fg);font-weight:500}

/* Disambiguation */
.disambig{background:var(--ph-surface);border:1px solid var(--ph-border);border-radius:11px;padding:9px;max-width:205px;display:flex;flex-direction:column;gap:5px}
.disambig-opt{display:flex;align-items:flex-start;gap:7px;padding:6px 8px;border-radius:7px;border:1px solid var(--ph-border);cursor:pointer}
.disambig-key{font-size:10px;font-weight:700;color:var(--ph-lime);font-family:var(--font-mono);flex-shrink:0;padding-top:1px}
.disambig-label{font-size:10.5px;color:var(--ph-fg);font-weight:500}
.disambig-desc{font-size:9.5px;color:var(--ph-fg-2);margin-top:1px}

/* Loading skeleton */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton{background:linear-gradient(90deg,var(--ph-surface) 25%,var(--ph-surface-2) 50%,var(--ph-surface) 75%);background-size:400px 100%;animation:shimmer 1.6s ease infinite;border-radius:4px}
.phone-loading{padding:20px 16px;display:flex;flex-direction:column;gap:10px}
.phone-loading-line{height:10px}
.phone-loading-line:nth-child(2){animation-delay:.15s}
.phone-loading-line:nth-child(3){animation-delay:.3s}
.phone-loading-line:nth-child(5){animation-delay:.1s}
.phone-loading-line:nth-child(6){animation-delay:.25s}

/* Error state in phone */
.phone-error{padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:8px;text-align:center}
.phone-error-icon{font-size:20px}
.phone-error-msg{font-size:11px;color:var(--ph-fg-2);line-height:1.5}
.phone-error-retry{margin-top:4px;background:var(--ph-surface);border:1px solid var(--ph-border);color:var(--ph-fg);padding:6px 14px;border-radius:var(--r-pill);font-size:11px;cursor:pointer;font-family:var(--font-sans)}

/* Generating scenarios state */
.gen-loading{padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}
.gen-spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--fg);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-label{font-size:13px;color:var(--fg-2)}.gen-sub{font-size:12px;color:var(--fg-3)}
/* Cycling loading messages */
.gen-label-cycle{position:relative;height:20px;min-width:260px}
.gen-label-cycle .cycle-msg{position:absolute;left:0;right:0;font-size:13px;color:var(--fg-2);white-space:nowrap}
.cycle-msg.msg-a{animation:cycle-a 5s ease-in-out infinite}
.cycle-msg.msg-b{animation:cycle-b 5s ease-in-out infinite}
@keyframes cycle-a{0%,35%{opacity:1}45%,90%{opacity:0}100%{opacity:1}}
@keyframes cycle-b{0%,35%{opacity:0}45%,90%{opacity:1}100%{opacity:0}}

/* Error banner */
.error-banner{padding:12px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:var(--r-md);font-size:12px;color:var(--status-high);line-height:1.5;display:flex;align-items:flex-start;gap:8px}

/* Sidebar controls */
.tweak-textarea{width:100%;padding:8px 10px;border:1px solid var(--border-2);border-radius:var(--r-sm);background:var(--bg);color:var(--fg);font-family:var(--font-sans);font-size:12px;line-height:1.5;resize:none;outline:none;transition:border-color var(--dur) var(--ease)}
.tweak-textarea:focus{border-color:var(--fg-3)}
.tweak-textarea::placeholder{color:var(--fg-4)}
.tweak-toast{border:1px solid var(--border);border-radius:var(--r-md);background:var(--bg);padding:10px 12px;display:flex;flex-direction:column;gap:7px;box-shadow:var(--shadow-card)}
.toast-label{font-size:10px;font-weight:600;font-family:var(--font-mono);color:var(--accent);text-transform:uppercase;letter-spacing:0.08em}
.toast-rule{font-size:11.5px;color:var(--fg);line-height:1.5;font-style:italic}
.toast-actions{display:flex;gap:6px}
.btn-keep{background:var(--fg);color:var(--bg);border:none;padding:5px 13px;border-radius:var(--r-sm);font-size:11px;font-weight:600;font-family:var(--font-sans);cursor:pointer}
.btn-discard{background:none;border:1px solid var(--border);color:var(--fg-2);padding:5px 13px;border-radius:var(--r-sm);font-size:11px;font-family:var(--font-sans);cursor:pointer}
.learned-rule{padding:6px 8px;border-radius:var(--r-sm);background:var(--bg);border:1px solid var(--border);font-size:11px;color:var(--fg-2);line-height:1.4;display:flex;align-items:flex-start;gap:6px;margin-bottom:6px}
.rule-dot{color:var(--accent);font-size:14px;line-height:1.1;flex-shrink:0}
.rule-remove{color:var(--fg-4);background:none;border:none;cursor:pointer;font-size:13px;margin-left:auto;padding:0 2px;line-height:1;flex-shrink:0}
.spec-preview{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-family:var(--font-mono);font-size:10px;color:var(--fg-2);line-height:1.75}
.spec-key{color:var(--accent);font-weight:600;margin-bottom:2px}.spec-val{margin-bottom:10px}

/* Materials overlay */
.mat-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.28);z-index:350;display:flex;justify-content:flex-end}
.mat-panel{width:400px;background:var(--bg);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;box-shadow:-8px 0 32px rgba(0,0,0,0.1)}
.mat-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mat-title{font-size:15px;font-weight:600;letter-spacing:-0.01em}
.mat-close{background:none;border:none;font-size:20px;color:var(--fg-3);cursor:pointer;padding:2px 4px;line-height:1}
.mat-close:hover{color:var(--fg)}
.mat-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.mat-item{border:1px solid var(--border);border-radius:var(--r-md)}
.mat-item-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.mat-item-name{font-size:13px;font-weight:500}.mat-item-status{font-size:10px;font-family:var(--font-mono)}
.status-loaded{color:var(--status-good)}.status-missing{color:var(--fg-4)}.status-custom{color:var(--ph-blue)}
.mat-item-body{padding:10px 14px;font-size:12px;color:var(--fg-2);line-height:1.55}
.mat-actions{display:flex;gap:6px;padding:8px 14px;border-top:1px solid var(--border)}

/* Onboarding */
.onb-overlay{position:fixed;inset:0;background:rgba(250,250,248,0.92);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.onb-card{width:480px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-hover);padding:36px;display:flex;flex-direction:column;gap:22px}
.onb-top{display:flex;flex-direction:column;gap:10px}
.onb-top-row1{display:flex;align-items:flex-start;justify-content:space-between}
.onb-brand{display:flex;align-items:center;gap:9px}
.onb-brand-logo{width:26px;height:26px;border-radius:6px;background:var(--fg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.onb-brand-name{font-size:13px;font-weight:600;letter-spacing:-0.01em;color:var(--fg)}
.onb-brand-tagline{font-size:11px;color:var(--fg-3);margin-top:1px}
.onb-dots{display:flex;gap:6px}
.onb-dot{height:6px;border-radius:var(--r-pill);background:var(--border-2);transition:all var(--dur) var(--ease);width:6px}
.onb-dot.active{background:var(--fg);width:18px}.onb-dot.done{background:var(--accent)}
.onb-skip{font-size:12px;color:var(--fg-3);background:none;border:none;cursor:pointer;font-family:var(--font-sans)}
.onb-skip:hover{color:var(--fg-2)}
/* Onboarding two-column layout */
.onb-layout{display:flex;align-items:center;gap:48px;max-width:900px;width:100%;padding:0 24px}
.onb-diagram{flex:0 0 260px;opacity:0.45;pointer-events:none;display:flex;justify-content:center}
/* Undo/redo bar below phone */
.phone-hist-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px}
.phone-hist-btn{background:none;border:1px solid var(--border-2);border-radius:var(--r-sm);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;color:var(--fg-2);transition:all var(--dur) var(--ease);font-family:var(--font-sans)}
.phone-hist-btn:hover:not(:disabled){background:var(--hover-tint);border-color:var(--border-2);color:var(--fg)}
.phone-hist-btn:disabled{opacity:0.3;cursor:not-allowed}
.phone-hist-label{font-size:11px;color:var(--fg-3);font-family:var(--font-mono);min-width:36px;text-align:center}
.onb-eyebrow{font-size:10px;font-weight:600;font-family:var(--font-mono);color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.onb-heading{font-size:20px;font-weight:600;letter-spacing:-0.02em;line-height:1.3;margin-bottom:8px}
.onb-sub{font-size:13px;color:var(--fg-2);line-height:1.6}
.onb-input{width:100%;padding:10px 13px;border:1px solid var(--border-2);border-radius:var(--r-md);background:var(--surface);color:var(--fg);font-family:var(--font-sans);font-size:13px;outline:none;transition:all var(--dur) var(--ease)}
.onb-input:focus{border-color:var(--fg-3);background:var(--bg)}
.onb-input::placeholder{color:var(--fg-4)}
.onb-options{display:flex;flex-direction:column;gap:7px}
.onb-option{padding:11px 14px;border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer;transition:all var(--dur) var(--ease);background:var(--bg);display:flex;align-items:flex-start;gap:11px}
.onb-option:hover{border-color:var(--border-2);background:var(--hover-tint)}
.onb-option.selected{border-color:var(--fg);background:var(--fg)}
.onb-radio{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border-2);flex-shrink:0;margin-top:2px;transition:all var(--dur) var(--ease)}
.onb-option.selected .onb-radio{background:var(--bg);border-color:var(--bg)}
.onb-opt-label{font-size:13px;font-weight:500;color:var(--fg)}
.onb-option.selected .onb-opt-label{color:var(--bg)}
.onb-opt-desc{font-size:11px;color:var(--fg-3);margin-top:2px}
.onb-option.selected .onb-opt-desc{color:rgba(250,250,248,0.65)}
.onb-actions{display:flex;gap:8px;justify-content:flex-end}
.btn-onb-back{background:none;border:1px solid var(--border);padding:9px 18px;border-radius:var(--r-sm);font-size:13px;font-family:var(--font-sans);color:var(--fg-2);cursor:pointer;transition:all var(--dur) var(--ease)}
.btn-onb-back:hover{background:var(--hover-tint)}
.btn-onb-next{background:var(--fg);color:var(--bg);border:none;padding:9px 22px;border-radius:var(--r-sm);font-size:13px;font-weight:500;font-family:var(--font-sans);cursor:pointer}
.btn-onb-next:hover{background:#333}.btn-onb-next:disabled{opacity:.35;cursor:not-allowed}

/* Step 1 intent picker */
.intent-picker{flex:1;overflow-y:auto;padding:32px 24px;display:flex;flex-direction:column;gap:24px}
.intent-picker-head{text-align:center;max-width:480px;align-self:center}
.intent-picker-eyebrow{font-size:10px;font-weight:600;font-family:var(--font-mono);color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.intent-picker-heading{font-size:20px;font-weight:600;letter-spacing:-0.02em;margin-bottom:6px}
.intent-picker-sub{font-size:13px;color:var(--fg-2);line-height:1.6}
.intent-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:640px;align-self:center;width:100%}
.intent-tile{padding:14px;border:1px solid var(--border);border-radius:var(--r-md);cursor:pointer;transition:all var(--dur) var(--ease);background:var(--bg);text-align:left;font-family:var(--font-sans);width:100%}
.intent-tile:hover{border-color:var(--border-2);box-shadow:var(--shadow-card);transform:translateY(-1px)}
.intent-tile:active{transform:translateY(0)}
.intent-tile-id{font-family:var(--font-mono);font-size:10px;color:var(--accent);font-weight:500;margin-bottom:6px}
.intent-tile-text{font-size:12px;color:var(--fg);line-height:1.45}
.intent-divider{display:flex;align-items:center;gap:12px;color:var(--fg-4);font-size:11px;max-width:640px;align-self:center;width:100%}
.intent-divider::before,.intent-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* Step 2 scenario editor */
.scenario-editor-list{display:flex;flex-direction:column;gap:8px}
.scenario-editor-row{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;display:flex;flex-direction:column;gap:8px;transition:border-color var(--dur) var(--ease)}
.scenario-editor-row:focus-within{border-color:var(--border-2);box-shadow:0 0 0 2px rgba(0,0,0,0.04)}
.scenario-row-top{display:flex;align-items:center;gap:8px}
.scenario-label-input{flex:1;border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 9px;font-family:var(--font-sans);font-size:13px;font-weight:500;color:var(--fg);background:var(--bg);outline:none;transition:border-color var(--dur) var(--ease)}
.scenario-label-input:focus{border-color:var(--fg-3)}
.scenario-cat-select{border:1px solid var(--border);border-radius:var(--r-pill);padding:3px 9px;font-size:11px;font-family:var(--font-sans);font-weight:500;color:var(--fg-2);background:var(--bg);cursor:pointer;outline:none;flex-shrink:0;transition:border-color var(--dur) var(--ease)}
.scenario-cat-select.badge-happy{color:var(--status-good);border-color:#bbf7d0;background:#f0fdf4}
.scenario-cat-select.badge-error{color:var(--status-high);border-color:#fecaca;background:#fef2f2}
.scenario-cat-select.badge-edge{color:var(--status-warn);border-color:#fed7aa;background:#fff7ed}
.scenario-cat-select.badge-empty{color:var(--fg-3);border-color:var(--border-2);background:var(--surface)}
.scenario-cat-select:focus{border-color:var(--fg-3)}
.scenario-condition-input{width:100%;border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 9px;font-family:var(--font-sans);font-size:12px;color:var(--fg-2);background:var(--surface);outline:none;resize:none;line-height:1.4;transition:border-color var(--dur) var(--ease)}
.scenario-condition-input:focus{border-color:var(--fg-3)}
.scenario-delete{background:none;border:none;color:var(--fg-4);cursor:pointer;font-size:18px;padding:2px 5px;line-height:1;flex-shrink:0;transition:color var(--dur) var(--ease)}
.scenario-delete:hover{color:var(--status-high)}
.add-scenario-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:1.5px dashed var(--border-2);border-radius:var(--r-md);font-size:12px;color:var(--fg-3);cursor:pointer;background:transparent;font-family:var(--font-sans);width:100%;transition:all var(--dur) var(--ease)}
.add-scenario-btn:hover{border-color:var(--fg-3);color:var(--fg-2);background:var(--hover-tint)}

/* Persona textarea */
.persona-textarea{width:100%;font-size:11.5px;color:var(--fg-2);line-height:1.65;padding:10px 12px;background:var(--surface);border-radius:var(--r-sm);border:1px solid var(--border-2);font-family:var(--font-mono);resize:vertical;outline:none;min-height:80px;transition:border-color var(--dur) var(--ease)}
.persona-textarea:focus{border-color:var(--fg-3)}
.btn-persona-save{background:var(--fg);color:var(--bg);border:none;padding:8px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:500;font-family:var(--font-sans);cursor:pointer;width:100%;transition:background var(--dur) var(--ease)}
.btn-persona-save:hover{background:#333}
.persona-save-feedback{text-align:center;font-size:11px;color:var(--status-good);padding:3px 0}

/* Scenario status indicators */
.s-gen-spinner{width:9px;height:9px;border:1.5px solid var(--border-2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;margin-left:auto}
@keyframes pulse-dot{0%,100%{opacity:.35}50%{opacity:.9}}
.s-pending-dot{width:7px;height:7px;border-radius:50%;background:var(--border-2);flex-shrink:0;margin-left:auto;animation:pulse-dot 1.4s ease infinite}
.s-gen-done{font-size:9px;font-weight:700;color:var(--status-good);margin-left:auto;flex-shrink:0;line-height:1}
.scenario-card.active .s-pending-dot{background:rgba(255,255,255,0.35)}
.scenario-card.active .s-gen-done{color:rgba(255,255,255,0.6)}
.scenario-card.active .s-gen-spinner{border-color:rgba(255,255,255,0.25);border-top-color:var(--accent)}

/* Materials replace form */
.mat-replace-form{padding:10px 14px 12px;background:var(--surface);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px;border-radius:0 0 var(--r-md) var(--r-md)}
.mat-opt-btn{padding:8px 10px;border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;font-size:12px;color:var(--fg-2);background:var(--bg);text-align:left;font-family:var(--font-sans);width:100%;transition:all var(--dur) var(--ease);line-height:1.3}
.mat-opt-btn:hover{border-color:var(--border-2);color:var(--fg)}
.mat-opt-btn.mat-opt-selected{border-color:var(--fg);color:var(--fg);background:var(--hover-tint)}
.mat-opt-btn.mat-opt-remove{color:var(--status-high);border-color:#fecaca;background:none}
.mat-opt-btn.mat-opt-remove:hover{background:#fef2f2}
.mat-replace-input{width:100%;padding:7px 10px;border:1px solid var(--border-2);border-radius:var(--r-sm);font-size:12px;font-family:var(--font-sans);color:var(--fg);background:var(--bg);outline:none;transition:border-color var(--dur) var(--ease)}
.mat-replace-input:focus{border-color:var(--fg-3)}
.mat-replace-input::placeholder{color:var(--fg-4)}
.mat-replace-textarea{width:100%;padding:7px 10px;border:1px solid var(--border-2);border-radius:var(--r-sm);font-size:12px;font-family:var(--font-sans);color:var(--fg);background:var(--bg);outline:none;resize:none;height:90px;line-height:1.5;transition:border-color var(--dur) var(--ease)}
.mat-replace-textarea:focus{border-color:var(--fg-3)}
.mat-replace-textarea::placeholder{color:var(--fg-4)}
.btn-mat-done{background:var(--fg);color:var(--bg);border:none;padding:6px 14px;border-radius:var(--r-sm);font-size:11px;font-weight:500;font-family:var(--font-sans);cursor:pointer}
.btn-mat-done:hover{background:#333}

/* Export panel */
@keyframes fade-in-overlay{from{opacity:0}to{opacity:1}}
@keyframes slide-in-right{from{transform:translateX(100%)}to{transform:translateX(0)}}
.export-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.28);z-index:200;display:flex;align-items:flex-end;justify-content:flex-end;animation:fade-in-overlay 0.18s ease}
.export-panel{width:320px;height:100%;background:var(--bg);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;box-shadow:-8px 0 32px rgba(0,0,0,0.1);animation:slide-in-right 0.2s cubic-bezier(0.25,0,0.1,1)}
.export-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.export-title{font-size:15px;font-weight:600;letter-spacing:-0.01em}
.export-close{background:none;border:none;font-size:20px;color:var(--fg-3);cursor:pointer;padding:2px 4px;line-height:1}
.export-close:hover{color:var(--fg)}
.export-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:20px}
.export-check-list{display:flex;flex-direction:column;gap:2px}
.export-check-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;transition:background var(--dur) var(--ease)}
.export-check-row:hover{background:var(--hover-tint)}
.export-checkbox{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border-2);background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--dur) var(--ease)}
.export-checkbox.checked{background:var(--fg);border-color:var(--fg)}
.export-checkbox.checked::after{content:'✓';font-size:10px;color:var(--bg);font-weight:700;line-height:1}
.export-check-label{font-size:13px;font-weight:500;color:var(--fg)}
.export-check-desc{font-size:11px;color:var(--fg-3);line-height:1.4;margin-top:1px}
.export-scope-toggle{display:flex;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin-top:2px}
.export-scope-btn{flex:1;padding:7px 10px;font-size:12px;font-weight:500;background:var(--bg);border:none;cursor:pointer;font-family:var(--font-sans);color:var(--fg-3);transition:all var(--dur) var(--ease);text-align:center}
.export-scope-btn.active{background:var(--fg);color:var(--bg);font-weight:600}

// Normalize whatever window.cowork.askClaude returns into a plain string
function extractText(response) {
  if (typeof response === 'string') return response;
  if (!response) return '';
  // Anthropic-style: { content: [{type:'text', text:'...'}] }
  if (Array.isArray(response.content)) {
    return response.content.map(c => (typeof c === 'string' ? c : c.text || '')).join('');
  }
  // Simple object with a text or content string field
  if (typeof response.text === 'string') return response.text;
  if (typeof response.content === 'string') return response.content;
  if (typeof response.message === 'string') return response.message;
  // Last resort
  return JSON.stringify(response);
}

function parseJSON(raw) {
  const text = extractText(raw);
  try {
    let t = text.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
    const m = t.match(/[\[{][\s\S]*[\]}]/);
    if (m) t = m[0];
    return JSON.parse(t);
  } catch(e) {
    console.error('JSON parse failed:', text.slice(0, 300));
    throw new Error('Could not parse Claude\'s response as JSON. Try generating again.');
  }
}

async function generateScenarios(intent) {
  if (S.generatingScenarios) return;   // guard against duplicate calls
  S.generatingScenarios = true;
  S.scenarioError = null;
  S.scenarios = [];
  render();

  // Use parsed scenarioContext per active material; fall back to full content if not yet parsed
  const materialScenarioContext = S.materials
    .filter(m => !m.removed)
    .map(m => m.parsed ? m.scenarioContext : m.content)
    .filter(Boolean)
    .join('\n\n');
  const scenariosRefBlock = materialScenarioContext;
  const prompt = `You are an expert conversation designer. Expand this chatbot user intent into scenario branches.

Domain: ${S.onbDomain}
User Intent: "${intent}"
${scenariosRefBlock ? '\nKNOWLEDGE BASE — SCENARIO REFERENCE (use to inform branch types, conditions, and coverage):\n' + scenariosRefBlock : ''}
Generate 5–9 scenarios covering all paths. Include: 1+ happy path, 2+ error states, 2+ edge cases, 1 empty state.

IMPORTANT: Return ONLY a valid JSON array. No markdown, no explanation. Each object must have exactly:
{
  "id": "S1",
  "label": "Short outcome label (3–6 words)",
  "category": "Happy path" OR "Error state" OR "Edge case" OR "Empty state",
  "condition": "IF [brief system/user state description]"
}`;

  try {
    const response = await window.cowork.askClaude(prompt);
    const scenarios = parseJSON(response);
    S.scenarios = scenarios;
    S.submittedIntent = intent;
    S.selectedScenario = null;
    S.coverageDismissed = false;
    // Clear all cached conversations — new scenarios have new conditions,
    // old conversations keyed by the same IDs (S1, S2…) must not bleed through.
    S.generatedConvos = {};
    S.convoHistory = {};
    S.convoHistoryIdx = {};
    S.step = 2;
  } catch(e) {
    S.scenarioError = e.message || 'Generation failed. Please try again.';
  } finally {
    S.generatingScenarios = false;
    render();
  }
}

// Deep-clone a convo turns array so history entries are truly independent
function cloneConvo(turns) { return JSON.parse(JSON.stringify(turns)); }

// Push current generatedConvos[key] to history as a deep clone
function pushConvoHistory(key) {
  if (!S.convoHistory[key]) S.convoHistory[key] = [];
  const curIdx = S.convoHistoryIdx[key] ?? S.convoHistory[key].length - 1;
  S.convoHistory[key] = S.convoHistory[key].slice(0, curIdx + 1);
  S.convoHistory[key].push(cloneConvo(S.generatedConvos[key]));
  S.convoHistoryIdx[key] = S.convoHistory[key].length - 1;
}

async function generateConversation(scenario, persona) {
  const key = scenario.id + '-' + persona;
  if (S.generatedConvos[key] || S.generatingKeys.has(key)) return;
  S.generatingKeys.add(key);
  S.awaitingRegenKeys.delete(key);
  S.convError = null;
  render();

  const personaText = (S.personaTexts && S.personaTexts[persona]) || PERSONAS[persona].text;
  // Only include KB materials when they are actually loaded
  // Use parsed conversationContext per active material; fall back to full content if not yet parsed
  const convBlock = S.materials
    .filter(m => !m.removed)
    .map(m => m.parsed ? m.conversationContext : m.content)
    .filter(Boolean)
    .join('\n\n');
  const prompt = `You are an expert chatbot conversation designer. Generate the phone conversation for a ${S.onbDomain} chatbot.

BOT PERSONA:
${personaText}

PHONE SIMULATOR — only these component types render:
${PHONE_SIM_SCHEMA_UNIVERSAL}
${convBlock ? '\nDESIGN KNOWLEDGE BASE — apply these principles when deciding which components to use and how to write responses:\n' + convBlock : ''}

SCENARIO TO DESIGN:
Intent: "${S.submittedIntent}"
Scenario ${scenario.id}: ${scenario.label}
Category: ${scenario.category}
Condition: ${scenario.condition}
${(() => { const scRules = (S.scenarioRules && S.scenarioRules[scenario.id]) || []; const all = [...S.learnedRules, ...scRules, ...(S.pendingRule ? ['APPLY THIS SPECIFIC CHANGE TO THE RESPONSE: ' + S.pendingRule] : [])]; return all.length > 0 ? '\nADDITIONAL INSTRUCTIONS FROM DESIGNER:\n' + all.map(r=>'- '+r).join('\n') : ''; })()}

Generate a focused 4–7 turn conversation. Always open with the user expressing their intent. Show the key bot response, any critical system state (error, confirmation), and the resolution. Skip micro-interactions — only include meaningful decision points, not every button tap.

COMPONENT RULES:
- Every field must have realistic values drawn from the scenario context (names, IDs, amounts, statuses, messages). Blank fields are invalid output.
- Only include a component when it adds meaningful state information — not in every turn.

Return ONLY a valid JSON array of turns. No markdown, no explanation.
Turn format:
- Bot: {"type":"bot", "bubbles":["text1","text2"], "component":{...}, "quickReplies":["Action one","Action two"]} (component and quickReplies optional)
- User: {"type":"user", "text":"what the user taps or types"}`;

  // On first attempt use the full prompt. On parse failure, retry with a lean prompt
  // that only asks for valid JSON — smaller, faster, and more likely to succeed.
  const retryPrompt = `The previous response was not valid JSON. Return ONLY a raw JSON array of turns for this scenario, no explanation:

Scenario: ${scenario.label} (${scenario.category})
Condition: ${scenario.condition}
Intent: "${S.submittedIntent}"
Persona: ${personaText.split('.')[0]}.

Use this turn format:
- Bot: {"type":"bot","bubbles":["..."],"quickReplies":["..."]}
- User: {"type":"user","text":"..."}

Return 4–6 turns as a JSON array. Raw JSON only.`;

  let lastError = null;
  for (let attempt = 0; attempt <= 1; attempt++) {
    try {
      const response = await window.cowork.askClaude(attempt === 0 ? prompt : retryPrompt);
      const turns = parseJSON(response);
      S.generatedConvos[key] = Array.isArray(turns) ? turns : turns.turns || [];
      // Push to undo history as a deep clone so versions stay independent
      pushConvoHistory(key);
      lastError = null;
      break;
    } catch(e) {
      lastError = e;
      const isParseError = e.message && e.message.includes('parse');
      if (!isParseError || attempt >= 1) break; // no retry for non-parse errors or 2nd failure
    }
  }
  if (lastError) {
    S.convError = lastError.message || 'Generation failed. Please try again.';
  }
  S.generatingKeys.delete(key);
  render();
}

// S1 is always generated first (awaited) so the user sees a result immediately.
// S2+ fire sequentially — one call per scenario preserves response quality.
async function generateAll(scenarios, persona) {
  const toGenerate = scenarios.filter(s => {
    const k = s.id + '-' + persona;
    return !S.generatedConvos[k] && !S.generatingKeys.has(k);
  });
  if (toGenerate.length === 0) return;

  const [first, ...rest] = toGenerate;

  // S1: await so it renders before the rest start
  await generateConversation(first, persona);

  // S2+: fire individually without awaiting — each renders as it completes
  rest.forEach(s => generateConversation(s, persona));
}

// Returns the active persona set — domain-specific when loaded, fallback to PERSONAS
function currentPersonas() {
  return S.domainPersonas || PERSONAS;
}

// Parses a material once via Claude, extracting two lean summaries.
// Runs in the background — updates mat in place, triggers render when done.
async function parseMaterial(mat) {
  mat.parsing = true;
  mat.parsed  = false;
  render();
  const prompt = `You are a parsing assistant for a chatbot conversation design tool.
Read the material below and extract two concise summaries.

SCENARIO_CONTEXT: Information useful when expanding a user intent into scenario branches — domain conditions, failure modes, system states, user states, edge case triggers, process rules. Omit tone guidance, component specs, and design system rules.

CONVERSATION_CONTEXT: Information useful when generating bot conversation turns — tone rules, response patterns, domain-specific facts the bot should know, handling guidance for specific situations, component usage rules. Omit abstract scenario branch structures and intent lists.

If nothing in the material applies to a context, return "" for that field.
Distil to essentials — do not copy verbatim.

Return ONLY valid JSON: {"scenarioContext": "...", "conversationContext": "..."}

MATERIAL NAME: ${mat.name}
MATERIAL CONTENT:
${mat.content}`;
  try {
    const response = await window.cowork.askClaude(prompt);
    const result   = parseJSON(response);
    mat.scenarioContext     = result.scenarioContext     || '';
    mat.conversationContext = result.conversationContext || '';
  } catch(e) {
    // Fallback: use full content for both so nothing is silently lost
    mat.scenarioContext     = mat.content;
    mat.conversationContext = mat.content;
  }
  mat.parsed  = true;
  mat.parsing = false;
  render();
}

// Base material factory — used for user-uploaded materials (no pre-distillation).
const makeBaseMat = (id, name, content, description = '') => ({ id, name, content, description, isDefault: true, removed: false, parsing: false, parsed: false, scenarioContext: '', conversationContext: '' });

// Pre-distilled factory — skips parseMaterial() for known bundled fallbacks.
// Also sets a stable KB card description so the excerpt doesn't fall back to raw content headers.
// Falls back to makeBaseMat behaviour for any content that isn't a recognised constant.
function makeMatWithPreDistill(id, name, content) {
  const mat = makeBaseMat(id, name, content);
  if      (content === GENERIC_GUIDELINES_FALLBACK)  { mat.scenarioContext = PREDISTILLED.unified_scenario;            mat.conversationContext = PREDISTILLED.unified_conv;            mat.parsed = true; mat.description = 'Adapted from H.P. Grice (1975) and Google Conversation Design (CC BY 4.0) · interpreted and extended for chatbot UI.'; }
  else if (content === DESIGN_M3_FALLBACK)           { mat.scenarioContext = '';                                        mat.conversationContext = PREDISTILLED.m3_conv;                  mat.parsed = true; mat.description = 'Adapted from Material Design 3 by Google (material.io/design) · CC BY 4.0. Interpreted and extended for chatbot UI.'; }
  else if (content === DESIGN_ANTX_FALLBACK)         { mat.scenarioContext = '';                                        mat.conversationContext = PREDISTILLED.antx_conv;                mat.parsed = true; mat.description = 'Adapted from Ant Design X by Ant Group (x.ant.design) · MIT licensed. AI-native chat library purpose-built for conversational AI.'; }
  return mat;
}

// Returns a stable human-readable description for a material.
// Checks content identity against known constants first so the correct description
// is always shown regardless of whether the field was persisted in saved state.
function getMaterialDescription(m) {
  if (m.content === GENERIC_GUIDELINES_FALLBACK) return 'Adapted from H.P. Grice (1975) and Google Conversation Design (CC BY 4.0) · interpreted and extended for chatbot UI.';
  if (m.content === DESIGN_M3_FALLBACK)          return 'Adapted from Material Design 3 by Google (material.io/design) · CC BY 4.0. Interpreted and extended for chatbot UI.';
  if (m.content === DESIGN_ANTX_FALLBACK)        return 'Adapted from Ant Design X by Ant Group (x.ant.design) · MIT licensed. AI-native chat library purpose-built for conversational AI.';
  // For user-uploaded or fetched materials, fall back to first readable prose line
  if (m.description) return m.description;
  const isAllCaps = l => l.length > 4 && l === l.toUpperCase() && /[A-Z]/.test(l);
  return (m.content || '').split('\n')
    .map(l => l.trim())
    .filter(l => l && l.length > 10
      && !l.startsWith('#') && !l.startsWith('═') && !l.startsWith('─')
      && !l.startsWith('*') && !l.startsWith('|') && !l.startsWith('-')
      && !isAllCaps(l))
    [0] || '';
}

// Seeds S.materials from onboarding selections, fetching .md files where applicable.
// Async because design system and guidelines may be fetched from relative paths.
// Called at end of initDomain so parsing overlaps with intent entry.
async function initMaterials() {
  S.materials = [];
  const makeMat = makeMatWithPreDistill;
  // ── GUIDELINES ──────────────────────────────────────────────
  const guidelinesFallback = GENERIC_GUIDELINES_FALLBACK;
  const universalContent = await fetchMaterialFile('materials/unified-conversation-design-principles.md', guidelinesFallback);

  if (S.onbGuidelines === 'paste' && S.onbGuidelinesPaste) {
    // Custom guidelines are active; unified principles appear under Not Applied so user can switch
    S.materials.push(makeMat('mat-guidelines', 'Custom guidelines', S.onbGuidelinesPaste));
    S.materials.push({ ...makeMat('mat-guidelines-universal', 'Unified conversation design principles', universalContent), removed: true });
  } else if (S.onbGuidelines === 'none') {
    S.materials.push({ ...makeMat('mat-guidelines-universal', 'Unified conversation design principles', universalContent), removed: true });
  } else {
    S.materials.push(makeMat('mat-guidelines', 'Unified conversation design principles', universalContent));
  }

  // ── DESIGN SYSTEM ────────────────────────────────────────────
  // M3 and Ant Design X are available for all domains.
  // Selected one becomes active; the rest go to Not applied in the KB.
  const dsOptions = ['m3', 'antx'];
  const dsFetch = {
    m3:   async () => fetchMaterialFile('materials/design-system-material3.md', DESIGN_M3_FALLBACK),
    antx: async () => fetchMaterialFile('materials/design-system-ant-design-x.md', DESIGN_ANTX_FALLBACK),
  };
  const dsLabel = {
    m3:   'Material Design 3',
    antx: 'Ant Design X',
  };

  if (S.onbDesign === 'custom' && S.onbDesignPaste) {
    // User-uploaded design system: add as active, all standard options go to Not applied
    const customMat = makeMat('mat-design', 'Custom design system', S.onbDesignPaste);
    customMat.dsKey = 'custom';
    S.materials.push(customMat);
    const altContents = await Promise.all(dsOptions.map(k => dsFetch[k]()));
    dsOptions.forEach((dsKey, i) => {
      const mat = { ...makeMat('mat-design-' + dsKey, dsLabel[dsKey], altContents[i]), removed: true, dsKey };
      S.materials.push(mat);
    });
  } else {
    const dsContents = await Promise.all(dsOptions.map(k => dsFetch[k]()));
    dsOptions.forEach((dsKey, i) => {
      const isSelected = S.onbDesign === dsKey;
      const matId = isSelected ? 'mat-design' : 'mat-design-' + dsKey;
      const content = dsContents[i];
      const mat = makeMat(matId, dsLabel[dsKey], content);
      mat.dsKey = dsKey; // always stamp so we can identify DS type after swaps
      if (!isSelected) mat.removed = true;
      S.materials.push(mat);
    });
  }

  // Any extra materials uploaded during onboarding step 3
  (S.onbExtras || []).forEach((e, i) => {
    if (e.content && e.content.trim()) {
      S.materials.push(makeMatWithPreDistill('mat-extra-' + i, e.name || 'Uploaded material', e.content));
    }
  });

  // Parse all active, unparsed materials in parallel
  S.materials.filter(m => !m.removed && !m.parsed).forEach(m => parseMaterial(m));
}

// Fires Claude to generate domain-specific intents + personas.
// Called early (at onboarding step 0) so results are ready by the time the user reaches step 1.
// Uses a staleness token (S.domainCallFor) so stale responses are discarded if the domain changes.
// Split into two calls so the loading screen clears as soon as intents are ready.
// Personas are only needed at step 3 — they generate in background after intents resolve.
async function generateDomainContent(domain) {
  S.domainLoading = true;
  // Only render the loading state if we're already on step 1 — don't disrupt onboarding DOM
  if (S.step === 1) render();

  // Call 1: intents only — small prompt, resolves fast, clears the loading screen
  const intentPrompt = `Generate 6 specific, realistic user intents for a ${domain} chatbot. Return ONLY a JSON array, no markdown:
[{"id":"E1","text":"..."},{"id":"E2","text":"..."},{"id":"E3","text":"..."},{"id":"E4","text":"..."},{"id":"E5","text":"..."},{"id":"E6","text":"..."}]
Each intent should be a concrete user goal (not generic filler).`;

  try {
    const intentResponse = await window.cowork.askClaude(intentPrompt);
    if (S.domainCallFor !== domain) return;
    const intents = parseJSON(intentResponse);
    if (Array.isArray(intents) && intents.length > 0) S.domainIntents = intents;
  } catch(e) {
    if (S.domainCallFor === domain) console.warn('Intent generation failed, using defaults:', e.message);
  }

  // Intents ready — clear loading screen. Only render if we're on step 1 (where the
  // spinner is shown); skip during onboarding to avoid disrupting textarea input.
  if (S.domainCallFor === domain) {
    S.domainLoading = false;
    if (S.step === 1) render();
  }

  // Call 2: personas — runs after intents, populates the persona selector at step 3.
  // Falls back to default PERSONAS if this call fails or hasn't resolved yet.
  const personaPrompt = `Generate 2 distinct bot persona types for a ${domain} chatbot. Return ONLY valid JSON, no markdown:
{"primary":{"name":"Bot name","tag":"Primary","text":"2-3 sentence persona instruction"},"secondary":{"name":"Bot name","tag":"Secondary","text":"2-3 sentence persona instruction"}}
Make the two personas meaningfully different roles (e.g. for travel: Booking Assistant + Trip Advisor).`;
  try {
    const personaResponse = await window.cowork.askClaude(personaPrompt);
    if (S.domainCallFor !== domain) return;
    const personas = parseJSON(personaResponse);
    if (personas && typeof personas === 'object') {
      S.domainPersonas = personas;
      const firstKey = Object.keys(personas)[0];
      S.persona = firstKey;
      S.personaTexts = {};
      S.personaNames = {};
      Object.keys(personas).forEach(k => {
        S.personaTexts[k] = personas[k].text;
        S.personaNames[k] = personas[k].name;
      });
      if (S.step !== 'onboarding') render();
    }
  } catch(e) {
    if (S.domainCallFor === domain) console.warn('Persona generation failed, using defaults:', e.message);
  }
}

// Called at step 0 Next click (early) AND again at onboarding end.
// First call fires generateDomainContent alone in the queue — latency is hidden behind
// onboarding steps 1+2. When domain resolves, initMaterials chains automatically so
// parseMaterial runs in background while user picks intent.
// Second call (onboarding end) is a no-op when domain hasn't changed.
// generateScenarios and generateConversation both have raw-content fallbacks so they
// never need to wait for parseMaterial to finish.
function initDomain() {
  const domain = (S.onbDomain || 'Crypto / Fintech').trim();
  if (S.domainInitialized === domain) return; // already in flight or completed
  S.domainInitialized = domain;
  S.domainCallFor = domain;
  // Fire and forget — no initMaterials chain here.
  // initMaterials is always called explicitly at onboarding end so it runs with
  // complete state (full paste content) rather than mid-input partial values.
  generateDomainContent(domain);
}

async function applyTweak(tweak) {
  if (!S.selectedScenario || !tweak.trim()) return;
  const key = S.selectedScenario.id + '-' + S.persona;
  delete S.generatedConvos[key];
  S.pendingRule = tweak.trim();   // included in the prompt for this one generation only
  S.tweak = '';
  render();
  await generateConversation(S.selectedScenario, S.persona);
  // Move the rule to capturedRule for the Keep/Discard toast, then clear pendingRule
  // so it doesn't bleed into other scenarios' generations
  S.capturedRule = S.pendingRule;
  S.pendingRule = null;
  render();
}

// PHONE COMPONENT RENDERERS
// ═══════════════════════════════════════════════════════════════
function renderComp(comp, turnIdx, convKey, compSlot) {
  if (!comp) return '';

  // Helpers — editable span and remove-wrap (only active when convKey is set)
  const ed = (val, field, extra) => {
    if (!convKey) return esc(val||'');
    return '<span class="comp-editable" contenteditable="true"'
      + ' data-key="'+esc(convKey)+'" data-idx="'+turnIdx+'" data-slot="'+esc(compSlot||'')+'" data-field="'+field+'"'
      + (extra||'') + '>' + esc(val||'') + '</span>';
  };
  const wrap = html => {
    if (!convKey) return html;
    return '<div class="comp-wrap">' + html
      + '<button class="item-remove-btn" data-action="remove-component"'
      + ' data-key="'+esc(convKey)+'" data-idx="'+turnIdx+'" data-slot="'+esc(compSlot||'')+'" title="Remove">×</button>'
      + '</div>';
  };

  switch(comp.type) {
    case 'metricCard':
      if (!comp.label && !comp.value) return '';
      return wrap('<div class="metric-card">'
        + '<div class="metric-card-head">'
        + (comp.label ? '<span class="metric-label">' + ed(comp.label, 'label') + '</span>' : '')
        + '</div>'
        + (comp.value ? '<div class="metric-value">' + ed(comp.value, 'value') + '</div>' : '')
        + (comp.meta  ? '<div class="metric-meta">'  + ed(comp.meta,  'meta')  + '</div>' : '')
        + (comp.cta   ? '<button class="btn-lime">'  + ed(comp.cta,   'cta')   + '</button>' : '')
        + '</div>');

    case 'confirmationOverlay': {
      const rows = (comp.rows||[]).map((r, ri) =>
        '<div class="conf-row"><span class="conf-label">'+esc(r.label)+'</span>'
        +'<span class="conf-value">'+ed(r.value, 'row-value', ' data-ridx="'+ri+'"')+'</span></div>'
      ).join('');
      return wrap('<div class="conf-overlay">'
        + '<div class="conf-title">' + ed(comp.title||'Confirm', 'title') + '</div>'
        + rows
        + '<div class="conf-actions">'
        + '<button class="btn-conf cancel">'   + ed(comp.cancelCta||'Go back', 'cancelCta')   + '</button>'
        + '<button class="btn-conf confirm' + (comp.destructive?' destructive':'') + '">'
        + ed(comp.confirmCta||'Confirm', 'confirmCta') + '</button>'
        + '</div></div>');
    }

    case 'warningBanner':
      if (!comp.message) return '';
      return wrap('<div class="banner banner-warning"><span class="banner-icon">⚠</span><span>' + ed(comp.message, 'message') + '</span></div>');
    case 'infoBanner':
      if (!comp.message) return '';
      return wrap('<div class="banner banner-info"><span class="banner-icon">ℹ</span><span>' + ed(comp.message, 'message') + '</span></div>');
    case 'successBanner':
      if (!comp.message) return '';
      return wrap('<div class="banner banner-success"><span class="banner-icon">✓</span><span>' + ed(comp.message, 'message') + '</span></div>');

    case 'recordCard':
      if (!comp.id && !comp.primaryValue && !comp.status) return '';
      return wrap('<div class="record-card">'
        + '<div class="record-card-head">'
        + (comp.id     ? '<span class="record-id">'     + ed(comp.id,     'id')     + '</span>' : '')
        + (comp.status ? '<span class="record-status">' + ed(comp.status, 'status') + '</span>' : '')
        + '</div>'
        + (comp.primaryValue ? '<div class="record-primary">'+ed(comp.primaryValue,'primaryValue')+'</div>' : '')
        + ((comp.rows||[]).map((r,ri) =>
            '<div class="record-row"><span class="record-label">'+esc(r.label)+'</span>'
            +'<span class="record-value">'+ed(r.value,'row-value',' data-ridx="'+ri+'"')+'</span></div>'
          ).join(''))
        + '</div>');

    case 'disambiguation': {
      const opts = (comp.options||[]).map((o, oi) =>
        '<div class="disambig-opt">'
        + '<span class="disambig-key">'+esc(o.key||'')+'</span>'
        + '<div><div class="disambig-label">'+ed(o.label||'','opt-label',' data-oidx="'+oi+'"')+'</div>'
        + '<div class="disambig-desc">'+ed(o.desc||o.description||'','opt-desc',' data-oidx="'+oi+'"')+'</div></div></div>'
      ).join('');
      return wrap('<div class="disambig">' + opts + '</div>');
    }

    default:
      return '';
  }
}

function renderTurn(turn, turnIdx, convKey) {
  const canEdit = convKey != null;

  if (turn.type === 'user') {
    const rawText = turn.text || '';
    const bubbleAttrs = canEdit
      ? ' class="bubble-user bubble-editable" contenteditable="true" data-field="text" data-key="'+esc(convKey)+'" data-idx="'+turnIdx+'" data-raw="'+esc(rawText)+'"'
      : ' class="bubble-user"';
    const rmBtn = canEdit
      ? '<button class="item-remove-btn" data-action="remove-bubble" data-key="'+esc(convKey)+'" data-idx="'+turnIdx+'" data-bidx="0" title="Remove">×</button>'
      : '';
    const inner = '<div'+bubbleAttrs+'>'+renderBubbleMarkdown(rawText)+'</div>';
    const wrapped = canEdit ? '<div class="bubble-wrap">'+inner+rmBtn+'</div>' : inner;
    return '<div class="chat-turn user">'+wrapped+'</div>';
  }

  const bubbles = (turn.bubbles||[]).map((b, bi) => {
    const bubbleAttrs = canEdit
      ? ' class="bubble-bot bubble-editable" contenteditable="true" data-field="bubble" data-key="'+esc(convKey)+'" data-idx="'+turnIdx+'" data-bidx="'+bi+'" data-raw="'+esc(b)+'"'
      : ' class="bubble-bot"';

    const rmBtn = '<button class="item-remove-btn" data-action="remove-bubble" data-key="'+esc(convKey)+'" data-idx="'+turnIdx+'" data-bidx="'+bi+'" title="Remove">×</button>';
    return '<div class="bubble-wrap">'+inner+rmBtn+'</div>';
  }).join('');

  const comp  = renderComp(turn.component,  turnIdx, convKey, 'component');
  const comp2 = renderComp(turn.component2, turnIdx, convKey, 'component2');

  const qrs = turn.quickReplies && turn.quickReplies.length
    ? '<div class="quick-replies">'

          '<span class="quick-reply'+(i===0?' primary':'')+'">'+esc(q)+'</span>'
        ).join('')
      + '</div>'
    : '';

  return '<div class="chat-turn bot">'+bubbles+comp+comp2+qrs+'</div>';

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Renders markdown subset for phone sim bubbles (non-editable view only).
// Handles: **bold**, *italic*, - bullet lists, line breaks.
// Input is raw text; HTML-escaping applied first to prevent XSS.
function renderBubbleMarkdown(text) {
  const lines = String(text).split('\n');
  let html = '';
  let inList = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const listMatch = line.match(/^[-•]\s+(.+)$/);
    if (listMatch) {
      if (!inList) { html += '<ul style="margin:3px 0 3px 14px;padding:0;list-style:disc">'; inList = true; }
      html += '<li>' + applyInlineMd(esc(listMatch[1])) + '</li>';
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      const escaped = applyInlineMd(esc(line));
      html += escaped + (i < lines.length - 1 ? '<br>' : '');
    }
  }
  if (inList) html += '</ul>';
  return html;
}
function applyInlineMd(s) {
  return s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');
}

function badgeClass(cat) {
  return {
    'Happy path':'badge-happy','Error state':'badge-error',
    'Edge case':'badge-edge','Empty state':'badge-empty'
  }[cat] || 'badge-empty';
}

function scenarioCardHTML(s, showActive) {
  const active = showActive && S.selectedScenario && S.selectedScenario.id === s.id;
  const key = s.id + '-' + S.persona;
  const isGenerated  = !!S.generatedConvos[key];
  const isGenerating = !isGenerated && S.generatingKeys.has(key);
  const anyRunning   = S.generatingKeys.size > 0 || S.awaitingRegenKeys.size > 0;
  // pending = queued but not yet started (includes pre-populated awaiting keys)
  const isPending    = !isGenerated && ((anyRunning && !isGenerating) || S.awaitingRegenKeys.has(key));

  const indicator = isGenerated ? '<span class="s-gen-done">✓</span>'
    : (isGenerating || isPending) ? '<span class="s-gen-spinner"></span>'
    : '';

  return '<div class="scenario-card'+(active?' active':'')+'" data-action="select-scenario" data-sid="'+s.id+'">'
    + '<div class="scenario-card-top">'
    + '<span class="s-id">'+esc(s.id)+'</span>'
    + '<span class="s-badge '+badgeClass(s.category)+'">'+esc(s.category)+'</span>'
    + indicator
    + '</div>'
    + '<div class="s-label">'+esc(s.label)+'</div>'
    + '<div class="s-condition">'+esc(s.condition)+'</div>'
    + '</div>';
}
