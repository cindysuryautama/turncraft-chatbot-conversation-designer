    + '<button class="btn-footer-primary" data-action="save-session">'+(S.savingSession ? 'Saving…' : 'Save →')+'</button>'
    + '<label class="btn-footer-outline">'
    + 'Load'
    + '<input type="file" accept=".json" id="load-session-input" style="display:none">'
    + '</label>'
    + '</div>'
    + '<div style="font-size:10px;color:var(--fg-4);margin-top:5px;line-height:1.5">Downloads a .json — reload on any device or share with a teammate.</div>'
    + '</div>'
    + '<div>'
    + '<div class="sec-label" style="margin-bottom:8px">Export design</div>'
    + '<button class="btn-footer-primary" data-action="open-export" style="width:100%">Export →</button>'
    + '<div style="font-size:10px;color:var(--fg-4);margin-top:5px;line-height:1.5">HTML for sharing, or JSONL for LLM training.</div>'
    + '</div>'
    + '</div>';

  return '<div class="step3-sidebar" style="display:flex;flex-direction:column;overflow:hidden">'
    + '<div class="step3-sidebar-inner" style="flex:1;overflow-y:auto">'
    + tweak + pendingToast
    + '</div>'
    + footerZone
    + '</div>';
}

// ═══════════════════════════════════════════════════════════════
// MATERIALS PANEL
// ═══════════════════════════════════════════════════════════════
function renderMaterials() {
  if (!S.showMaterials) return '';

  // Usage label per material type
  const matMeta = (id) => {
    if (id.startsWith('mat-design')) return { use: 'Responses only' };
    return { use: 'Scenarios · Responses' };
  };

  // Flat list — all active materials treated equally regardless of origin
  const renderItem = m => {
    const isReplacing  = S.replacingMat === m.id;
    const isPreviewing = S.previewMatId === m.id;
    const meta = matMeta(m.id);

    if (isReplacing) {
      return '<div class="mat-card">'
        + '<div class="mat-replace-form" style="border-radius:var(--r-md);border:none">'
        + '<input class="mat-replace-input" id="replace-mat-name" placeholder="Material name…" value="'+esc(m.name)+'" style="margin-bottom:6px">'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
        + '<span style="font-size:11px;color:var(--fg-3)">Content</span>'
        + '<label for="replace-mat-file" style="font-size:11px;color:var(--fg-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px 10px;cursor:pointer;background:var(--bg)">↑ Upload .md</label>'
        + '<input type="file" id="replace-mat-file" accept=".md,.txt" style="display:none">'
        + '</div>'
        + '<textarea class="mat-replace-textarea" id="replace-mat-content" placeholder="Paste updated content here, or upload an .md file above…">'+esc(m.content)+'</textarea>'
        + '<div style="display:flex;gap:6px;margin-top:2px">'
        + '<button class="mat-opt-btn" style="width:auto;padding:6px 12px" data-action="cancel-replace-mat">Cancel</button>'
        + '<button class="btn-mat-done" data-action="confirm-replace-mat" data-id="'+m.id+'">Save</button>'
        + '</div></div>'
        + '</div>';
    }

    // Status badge
    const statusBadge = m.parsing
      ? '<span class="mat-badge badge-parsing">Parsing…</span>'
      : m.parsed
        ? (m.isDefault ? '<span class="mat-badge badge-ready">Ready</span>' : '<span class="mat-badge badge-custom">Custom</span>')
        : '';

    // Usage badge
    const useBadge = '<span class="mat-badge badge-use">'+meta.use+'</span>';

    const excerpt = getMaterialDescription(m);
    const excerptTrimmed = excerpt.length > 90 ? excerpt.slice(0, 90).replace(/\s+\S*$/, '') + '…' : excerpt;

    return '<div class="mat-card">'
      + '<div class="mat-card-body">'
      + '<div class="mat-card-name-line"><span class="mat-card-name">'+esc(m.name)+'</span>'+statusBadge+'</div>'
      + (excerptTrimmed ? '<div class="mat-card-excerpt">'+esc(excerptTrimmed)+'</div>' : '')
      + '</div>'
      + '<div class="mat-card-actions">'
      + '<button class="mat-card-btn'+(isPreviewing?' active':'')+'" data-action="preview-mat" data-id="'+m.id+'">'+(isPreviewing?'Hide preview':'Preview')+'</button>'
      + '<button class="mat-card-btn" data-action="replace-mat" data-id="'+m.id+'">Replace</button>'
      + '<button class="mat-card-btn danger" data-action="remove-mat" data-id="'+m.id+'">Remove</button>'
      + '</div>'
      + (isPreviewing ? '<div class="mat-preview-block">'+esc(m.content)+'</div>' : '')
      + '</div>';
  };

  // Not applied — all removed materials (offered in onboarding but not selected, or manually removed)
  const removedMats = S.materials.filter(m => m.removed);
  const removedSection = removedMats.length > 0
    ? '<div>'
      + '<div class="sec-label" style="padding:0 4px;margin-bottom:8px;margin-top:18px">Not applied</div>'
      + '<div class="mat-card-list">'
      + removedMats.map(m => {
          const excerpt = getMaterialDescription(m);
          const excerptTrimmed = excerpt.length > 90 ? excerpt.slice(0, 90).replace(/\s+\S*$/, '') + '…' : excerpt;
          return '<div class="mat-card mat-card-na">'
            + '<div class="mat-card-body">'
            + '<div class="mat-card-name-line"><span class="mat-card-name">'+esc(m.name)+'</span></div>'
            + (excerptTrimmed ? '<div class="mat-card-excerpt">'+esc(excerptTrimmed)+'</div>' : '')
            + '</div>'
            + '<div class="mat-card-actions">'
            + '<button class="mat-card-btn" data-action="add-back-mat" data-id="'+m.id+'">Apply</button>'
            + '</div>'
            + '</div>';
        }).join('')
      + '</div>'
      + '</div>'
    : '';

  // Learned from tweaks
  const allScenarioRuleEntries = Object.entries(S.scenarioRules || {}).filter(([,rules]) => rules && rules.length > 0);
  const totalRules = S.learnedRules.length + allScenarioRuleEntries.reduce((n,[,r])=>n+r.length,0);
  const rulesSection = totalRules > 0
    ? '<div>'
      + '<div class="sec-label" style="padding:0 4px;margin-bottom:6px;margin-top:18px">Learned from tweaks ('+totalRules+')</div>'
      + (S.learnedRules.length > 0
        ? '<div style="font-size:10px;color:var(--fg-3);padding:0 4px;margin-bottom:4px">All scenarios</div>'
          + S.learnedRules.map((r, i) =>
              '<div class="learned-rule" style="font-size:11.5px">'
              + '<span class="rule-dot">·</span>'
              + '<span style="flex:1">'+esc(r)+'</span>'
              + '<button class="rule-remove" data-action="remove-rule" data-idx="'+i+'">×</button>'
              + '</div>'
            ).join('')
        : '')
      + allScenarioRuleEntries.map(([sid, rules]) =>
          '<div style="font-size:10px;color:var(--fg-3);padding:0 4px;margin-top:8px;margin-bottom:4px">'+esc(sid)+' only</div>'
          + rules.map((r, i) =>
              '<div class="learned-rule" style="font-size:11.5px">'
              + '<span class="rule-dot">·</span>'
              + '<span style="flex:1">'+esc(r)+'</span>'
              + '<button class="rule-remove" data-action="remove-scenario-rule" data-sid="'+esc(sid)+'" data-idx="'+i+'">×</button>'
              + '</div>'
            ).join('')
        ).join('')
      + '</div>'
    : '';

  // Add material form or button
  const addSection = S.showAddMaterial
    ? '<div class="mat-replace-form" style="border:1px solid var(--border);border-radius:var(--r-md);margin-top:4px">'
      + '<div class="sec-label" style="margin-bottom:6px">New material</div>'
      + '<input class="mat-replace-input" id="mat-new-name" placeholder="Material name…" style="margin-bottom:6px">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
      + '<span style="font-size:11px;color:var(--fg-3)">Content</span>'
      + '<label for="mat-file-upload-new" style="font-size:11px;color:var(--fg-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px 10px;cursor:pointer;background:var(--bg);transition:all var(--dur) var(--ease)">↑ Upload .md</label>'
      + '<input type="file" id="mat-file-upload-new" accept=".md,.txt" style="display:none">'
      + '</div>'
      + '<textarea class="mat-replace-textarea" id="mat-new-content" placeholder="Paste content here, or upload an .md file above — guidelines, scenarios, brand voice, tone notes…" style="height:120px"></textarea>'
      + '<div style="display:flex;gap:6px;margin-top:2px">'
      + '<button class="mat-opt-btn" style="width:auto;padding:6px 12px" data-action="cancel-add-material">Cancel</button>'
      + '<button class="btn-mat-done" data-action="save-custom-material">Add</button>'
      + '</div></div>'
    : '<button class="btn-ghost" style="width:100%;font-size:12px;padding:9px;margin-top:8px" data-action="show-add-material">+ Add material</button>';

  const activeMats = S.materials.filter(m => !m.removed);
  const isEmpty = S.step === 'onboarding' && activeMats.length === 0 && removedMats.length === 0 && S.learnedRules.length === 0;
  const emptyState = isEmpty
    ? '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center">'
      + '<div style="font-size:28px;margin-bottom:14px;opacity:0.25">⊞</div>'
      + '<div style="font-size:13px;font-weight:500;color:var(--fg-2);margin-bottom:6px">No materials loaded</div>'
      + '<div style="font-size:12px;color:var(--fg-3);line-height:1.6;max-width:240px">Complete onboarding to load your design system, conversation guidelines, and domain scenarios.</div>'
      + '</div>'
    : '';
  const itemsHTML =
    emptyState
    + (activeMats.length > 0 ? '<div class="sec-label" style="padding:0 4px;margin-bottom:8px">Applied</div><div class="mat-card-list">'+activeMats.map(renderItem).join('')+'</div>' : '')
    + removedSection
    + rulesSection
    + addSection;

  // Footer — always visible; regenerates only if already in step 3 with scenarios
  const canRegen = S.step === 3 && S.scenarios.length > 0;
  const footer = '<div style="padding:16px 20px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg)">'
    + '<button class="btn-primary" data-action="apply-and-regen">'
    + (canRegen ? 'Apply and regenerate' : 'Apply')
    + '</button>'
    + '<div style="font-size:11px;color:var(--fg-3);margin-top:6px;text-align:center;line-height:1.5">'
    + (canRegen
        ? 'Closes the panel and regenerates all responses with the updated knowledge base'
        : 'Saves changes — responses will use the updated knowledge base on next generation')
    + '</div>'
    + '</div>';

  return '<div class="mat-overlay" data-action="close-materials">'
    + '<div class="mat-panel" data-action="noop">'
    + '<div class="mat-header"><div>'
    + '<div class="mat-title">Knowledge base</div>'
    + '</div><button class="mat-close" data-action="close-materials">×</button></div>'
    + '<div class="mat-body" style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px">'+itemsHTML+'</div>'
    + footer
    + '</div></div>';
}

// ═══════════════════════════════════════════════════════════════
// ONBOARDING
// ═══════════════════════════════════════════════════════════════
function renderOnboarding() {
  const step = S.onbStep;
  const dots = [0,1,2].map(i =>
    '<div class="onb-dot'+(i===step?' active':i<step?' done':'')+'"></div>'
  ).join('');

  let body = '';
  let eyebrow = 'Step '+(step+1)+' of 3';
  let heading = '';
  let sub = '';
  let canNext = step === 1 && S.onbDesign === 'custom' ? S.onbDesignPaste.trim().length > 0 : true;

  if (step === 0) {
    heading = 'What domain are you designing for?';
    sub = 'This shapes the example intents and personas. You can swap everything from the Knowledge base later.';
    canNext = S.onbDomain.trim().length > 0;
    // 3-category framing — shows what the tool will set up
    const catPill = (icon, label, note) =>
      '<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">'
      + '<div style="width:26px;height:26px;border-radius:6px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">'+icon+'</div>'
      + '<div><div style="font-size:12px;font-weight:500;color:var(--fg)">'+label+'</div>'
      + '<div style="font-size:11px;color:var(--fg-3);margin-top:1px">'+note+'</div></div>'
      + '</div>';
    body = '<input class="onb-input" id="onb-domain" placeholder="e.g. Crypto / Fintech, Healthcare, E-commerce…" value="'+esc(S.onbDomain)+'" autocomplete="off">'
      + '<div style="margin-top:6px">'
      + '<div style="font-size:10px;font-weight:600;font-family:var(--font-mono);color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">What you can set up</div>'
      + catPill('⊞', 'Design system', 'Tells the tool which UI components to use in bot responses.')
      + catPill('§', 'Conversation guidelines', 'Sets the rules for voice and tone, error handling, and interaction patterns.')
      + '<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0">'
      + '<div style="width:26px;height:26px;border-radius:6px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">≡</div>'
      + '<div><div style="font-size:12px;font-weight:500;color:var(--fg)">Training materials</div>'
      + '<div style="font-size:11px;color:var(--fg-3);margin-top:1px">Upload domain scenarios, support ticket data, brand voice docs, or any other reference material.</div></div>'
      + '</div>'
      + '</div>';
  } else if (step === 1) {
    heading = 'Choose a design system';
    sub = 'This teaches the tool which components to suggest in responses. You can swap or add more later.';
    const opts = [
      {v:'m3', label:'Material Design 3', desc:'Google\'s widely adopted cross-platform system. Familiar to most mobile designers.'},
      {v:'antx', label:'Ant Design X', desc:'AI-native chat library by Ant Group. Built for streaming, agent steps, and conversational AI.'},
      {v:'custom', label:'Upload my own', desc:'Paste or upload your design system doc — component list, tokens, usage rules.'},
      {v:'none', label:'Skip for now', desc:'Add a design system later from the Knowledge base.'},
    ];
    body = '<div class="onb-options">'
      + opts.map(o =>
          '<div class="onb-option'+(S.onbDesign===o.v?' selected':'')+'" data-action="set-onb-design" data-val="'+o.v+'">'
          + '<div class="onb-radio"></div>'
          + '<div><div class="onb-opt-label">'+esc(o.label)+'</div>'
          + '<div class="onb-opt-desc">'+esc(o.desc)+'</div></div>'
          + '</div>'
        ).join('')
      + (S.onbDesign === 'custom'
          ? '<div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">'
            + '<div style="display:flex;align-items:center;justify-content:space-between">'
            + '<span style="font-size:11px;color:var(--fg-3)">Paste content or upload a .md file</span>'
            + '<label for="onb-design-file" style="font-size:11px;color:var(--fg-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px 10px;cursor:pointer;background:var(--bg)">↑ Upload .md</label>'
            + '<input type="file" id="onb-design-file" accept=".md,.txt" style="display:none">'
            + '</div>'
            + '<textarea class="onb-input" id="onb-design-paste" rows="4" style="height:96px;resize:none;font-size:12px" placeholder="Paste your design system documentation here — component list, usage rules, token names…">'+esc(S.onbDesignPaste)+'</textarea>'
            + '</div>'
          : '')
      + '</div>';
  } else {
    heading = 'Choose training materials';
    sub = 'Training materials govern how the tool generates responses. Add as many as you need — you can always update them from the Knowledge base.';
    const opts = [
      {v:'preloaded', label:'Unified conversation design principles', desc:'Adapted from H.P. Grice (1975) and Google Conversation Design (CC BY 4.0) — works across domains.'},
      {v:'paste', label:'Upload my own guidelines', desc:'Paste or upload your own doc — the tool adapts its governance layer immediately.'},
      {v:'none', label:'Skip for now', desc:'Add guidelines later from the Knowledge base.'},
    ];
    const extras = S.onbExtras || [];
    body = '<div style="font-size:10px;font-weight:600;font-family:var(--font-mono);color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Conversation guidelines</div>'
      + '<div class="onb-options" style="margin-bottom:14px">'
      + opts.map(o =>
          '<div class="onb-option'+(S.onbGuidelines===o.v?' selected':'')+'" data-action="set-onb-guidelines" data-val="'+o.v+'">'
          + '<div class="onb-radio"></div>'
          + '<div><div class="onb-opt-label">'+esc(o.label)+'</div>'
          + '<div class="onb-opt-desc">'+esc(o.desc)+'</div></div>'
          + '</div>'
        ).join('')
      + (S.onbGuidelines==='paste'
        ? '<div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">'
          + '<div style="display:flex;align-items:center;justify-content:space-between">'
          + '<span style="font-size:11px;color:var(--fg-3)">Paste content or upload a .md file</span>'
          + '<label for="onb-guidelines-file" style="font-size:11px;color:var(--fg-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px 10px;cursor:pointer;background:var(--bg)">↑ Upload .md</label>'
          + '<input type="file" id="onb-guidelines-file" accept=".md,.txt" style="display:none">'
          + '</div>'
          + '<textarea class="onb-input" id="onb-paste" rows="4" style="height:96px;resize:none;font-size:12px" placeholder="Paste your conversation design guidelines here…">'+esc(S.onbGuidelinesPaste)+'</textarea>'
          + '</div>'
        : '')
      + '</div>'
      + '<div style="display:flex;flex-direction:column;gap:8px">'
      + '<div style="font-size:10px;font-weight:600;font-family:var(--font-mono);color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em">Other materials</div>'
      + '<div style="font-size:11px;color:var(--fg-3)">Upload domain-specific scenarios, support ticket data, brand voice docs, or any other reference material the tool should learn from.</div>'
      + (extras.length > 0
        ? '<div style="display:flex;flex-direction:column;gap:4px">'
          + extras.map((e, i) =>
              '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm)">'
              + '<span style="font-size:12px;color:var(--fg-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(e.name)+'</span>'
              + '<button data-action="remove-onb-extra" data-idx="'+i+'" style="background:none;border:none;color:var(--fg-4);cursor:pointer;font-size:14px;padding:0 0 0 8px;flex-shrink:0">×</button>'
              + '</div>'
            ).join('')
          + '</div>'
        : '')
      + '<div>'
      + '<label for="onb-extras-file" style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-2);border:1px solid var(--border-2);border-radius:var(--r-sm);padding:7px 14px;cursor:pointer;background:var(--bg);transition:all var(--dur) var(--ease)" onmouseover="this.style.borderColor=\'var(--fg-3)\'" onmouseout="this.style.borderColor=\'var(--border-2)\'">'
      + '<span style="font-size:13px">↑</span> Upload file'
      + '</label>'
      + '<input type="file" id="onb-extras-file" accept=".md,.txt,.csv" multiple style="display:none">'
      + '</div>'
      + '</div>';
  }

  const loadSessionLink = step === 0
    ? '<div style="display:flex;align-items:center;gap:10px;margin-top:4px">'
      + '<div style="flex:1;height:1px;background:var(--border)"></div>'
      + '<span style="font-size:11px;color:var(--fg-4);white-space:nowrap">or</span>'
      + '<div style="flex:1;height:1px;background:var(--border)"></div>'
      + '</div>'
      + '<label style="display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-radius:var(--r-sm);cursor:pointer;transition:background var(--dur) var(--ease)" onmouseover="this.style.background=\'var(--hover-tint)\'" onmouseout="this.style.background=\'\'">'
      + '<span style="font-size:12px;color:var(--accent);font-weight:500">Load a saved session</span>'
      + '<input type="file" accept=".json" id="load-session-input" style="display:none">'
      + '</label>'
    : '';

  return '<div class="onb-overlay">'
    + '<div class="onb-card">'
    + '<div class="onb-top">'
    + '<div class="onb-top-row1">'
    + '<div class="onb-brand">'
    + '<div class="onb-brand-logo">'+LOGO_SVG+'</div>'
    + '</div>'
    + '<button class="onb-skip" data-action="skip-onb">Skip setup →</button>'
    + '</div>'
    + '<div class="onb-dots">'+dots+'</div>'
    + '</div>'
    + '<div>'
    + '<div class="onb-eyebrow">'+eyebrow+'</div>'
    + '<div class="onb-heading">'+heading+'</div>'
    + '<div class="onb-sub">'+sub+'</div>'
    + '</div>'
    + body
    + '<div class="onb-actions">'
    + (step > 0 ? '<button class="btn-onb-back" data-action="onb-back">← Back</button>' : '')
    + '<button class="btn-onb-next" data-action="onb-next" '+(canNext?'':'disabled')+'>'
    + (step < 2 ? 'Continue →' : 'Start designing →')
    + '</button></div>'
    + loadSessionLink
    + '</div></div>';
}

// ═══════════════════════════════════════════════════════════════
// EXPORT PANEL RENDER
// ═══════════════════════════════════════════════════════════════
function renderExportPanel() {
  if (!S.showExportPanel) return '';

  const sel = S.selectedScenario;
  const sec = S.exportSections || {};
  const scope = S.exportScope || 'selected';
  const fmt = S.exportFormat || 'html';
  const isJSONL = fmt === 'jsonl';

  // HTML mode options
  const needsScope = !isJSONL && (sec.conversation || sec.spec);
  const nothingChecked = !isJSONL && !sec.conversation && !sec.spec && !sec.map && !sec.rules;
  const noSelWarning = needsScope && scope === 'selected' && !sel;
  const canExport = isJSONL ? S.scenarios.length > 0 : (!nothingChecked && !noSelWarning);

  const formatToggle = '<div>'
    + '<div class="sec-label" style="margin-bottom:8px">Format</div>'
    + '<div class="export-scope-toggle">'
    + '<button class="export-scope-btn'+(fmt==='html'?' active':'')+'" data-action="set-export-format" data-fmt="html">HTML</button>'
    + '<button class="export-scope-btn'+(isJSONL?' active':'')+'" data-action="set-export-format" data-fmt="jsonl">JSONL — for training</button>'
    + '</div></div>';

  const htmlOptions = !isJSONL ? (() => {
    const checks = [
      { key: 'conversation', label: 'Conversations',  desc: 'The full bot–user exchange for each scenario, including UI components.' },
      { key: 'spec',         label: 'Prompt specs',   desc: 'Trigger condition, persona, behaviour steps, and guardrails per scenario.' },
      { key: 'map',          label: 'Scenario map',   desc: 'All scenarios as a table — ID, category, and trigger condition.' },
      { key: 'rules',        label: 'Learned from tweaks', desc: 'Rules the tool extracted from your tweaks.' },
    ];
    const checksHTML = checks.map(c =>
      '<div class="export-check-row" data-action="toggle-export-section" data-key="'+c.key+'">'
      + '<div class="export-checkbox'+(sec[c.key]?' checked':'')+'"></div>'
      + '<div><div class="export-check-label">'+c.label+'</div>'
      + '<div class="export-check-desc">'+c.desc+'</div></div>'
      + '</div>'
    ).join('');
    const scopeHTML = needsScope
      ? '<div style="margin-top:14px">'
        + '<div class="sec-label" style="margin-bottom:8px">Scope</div>'
        + '<div class="export-scope-toggle">'
        + '<button class="export-scope-btn'+(scope==='selected'?' active':'')+'" data-action="set-export-scope" data-scope="selected">Selected scenario</button>'
        + '<button class="export-scope-btn'+(scope==='all'?' active':'')+'" data-action="set-export-scope" data-scope="all">All scenarios</button>'
        + '</div></div>'
      : '';
    const warningHTML = noSelWarning
      ? '<div style="font-size:11px;color:var(--status-warn);padding:8px 12px;background:#fff7ed;border-radius:var(--r-sm);border:1px solid #fed7aa">Select a scenario first, or switch scope to All scenarios.</div>'
      : '';
    return '<div style="margin-top:14px"><div class="sec-label" style="margin-bottom:8px">What to include</div>'
      + '<div class="export-check-list">'+checksHTML+'</div></div>'
      + scopeHTML + warningHTML;
  })() : '';

  const jsonlInfo = isJSONL
    ? '<div style="margin-top:14px;font-size:12px;color:var(--fg-2);line-height:1.6;padding:10px 12px;background:var(--surface);border-radius:var(--r-sm);border:1px solid var(--border)">'
      + 'One training example per scenario. Each contains a system prompt (persona + guardrails) and the full conversation in <span style="font-family:var(--font-mono);font-size:11px">{"role","content"}</span> format — ready for OpenAI, Anthropic, or Hugging Face fine-tuning.'
      + '</div>'
    : '';

  const btnLabel = isJSONL ? 'Download .jsonl file →' : 'Download HTML file →';

  return '<div class="export-overlay" data-action="close-export">'
    + '<div class="export-panel" data-action="noop">'
    + '<div class="export-header">'
    + '<span class="export-title">Export design</span>'
    + '<button class="export-close" data-action="close-export">×</button>'
    + '</div>'
    + '<div class="export-body">'
    + formatToggle
    + htmlOptions
    + jsonlInfo
    + '<button class="btn-export-go" data-action="do-export"'+(canExport?'':' disabled')+'>'+btnLabel+'</button>'
    + '</div>'
    + '</div></div>';
}

// ═══════════════════════════════════════════════════════════════
// PERSISTENCE — localStorage auto-save / restore
// ═══════════════════════════════════════════════════════════════
const STORAGE_KEY = 'chatbot-designer-v1';
const STATE_VERSION = 2;

function saveState() {
  try {
    const toSave = {
      version: STATE_VERSION,
      step: S.step, onbStep: S.onbStep, onbDomain: S.onbDomain,
      onbGuidelines: S.onbGuidelines, onbGuidelinesPaste: S.onbGuidelinesPaste, onbExtras: S.onbExtras || [],
      onbDesign: S.onbDesign, onbDesignUrl: S.onbDesignUrl, onbDesignPaste: S.onbDesignPaste,
      onbScenarios: S.onbScenarios,
      materials: S.materials.map(m => ({
        id: m.id, name: m.name, content: m.content, description: m.description || '', isDefault: m.isDefault,
        removed: m.removed, parsed: m.parsed,
        scenarioContext: m.scenarioContext, conversationContext: m.conversationContext,
      })),
      intent: S.intent, submittedIntent: S.submittedIntent,
      scenarios: S.scenarios, selectedScenario: S.selectedScenario,
      persona: S.persona, personaOpen: S.personaOpen,
      domainPersonas: S.domainPersonas,
      generatedConvos: S.generatedConvos,
      convoHistory: S.convoHistory,
      convoHistoryIdx: S.convoHistoryIdx,
      learnedRules: S.learnedRules,
      scenarioRules: S.scenarioRules || {},
      coverageDismissed: S.coverageDismissed,
      personaTexts: S.personaTexts, personaNames: S.personaNames,
      exportScope: S.exportScope, exportSections: S.exportSections,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch(e) { /* storage full or unavailable — silent */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    if (saved.version !== STATE_VERSION) { localStorage.removeItem(STORAGE_KEY); return false; }
    Object.assign(S, saved);
    // Re-init non-serializable / transient state
    S.generatingKeys = new Set();
    S.awaitingRegenKeys = new Set();
    S.generatingScenarios = false;
    S.scenarioError = null; S.convError = null;
    S.pendingRule = null; S.capturedRule = null; S.tweak = '';
    S.showMaterials = false; S.replacingMat = null; S.previewMatId = null;
    S.copyDone = false; S.showCopyChooser = false; S.personaSaveToast = false;
    S.showAddMaterial = false; S.domainLoading = false; S.domainCallFor = null; S.personaDirty = false;
    S.showExportPanel = false;
    // Migration: remove retired materials from saved sessions
    S.materials = S.materials.filter(m =>
      m.name !== 'Fintech conversation guidelines' &&
      m.name !== 'Fintech scenarios and top issues'
    );
    // Materials already in saved state — mark domain as initialised so initDomain() skips re-init
    S.domainInitialized = (S.onbDomain || 'Crypto / Fintech').trim();
    // Re-parse any materials that weren't fully parsed (e.g. mid-session refresh)
    S.materials.filter(m => !m.removed && !m.parsed).forEach(m => parseMaterial(m));
    return true;
  } catch(e) { localStorage.removeItem(STORAGE_KEY); return false; }
}

// ═══════════════════════════════════════════════════════════════
// EXPORT — build self-contained HTML file for download
// ═══════════════════════════════════════════════════════════════
function buildExportHTML(scope, sections) {
  sections = sections || { conversation: true, spec: true, map: false, rules: false };
  scope = scope || 'selected';
  const sel = S.selectedScenario;
  const personaName = (S.personaNames && S.personaNames[S.persona]) || S.persona;
  const personaText = (S.personaTexts && S.personaTexts[S.persona]) || (currentPersonas()[S.persona] || {}).text || '';

  const esc2 = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // ── Component renderer ────────────────────────────────────────
  function renderCompExport(c) {
    if (!c || !c.type) return '';
    switch (c.type) {
      case 'metricCard':
        return `<div class="xc-metric">
          ${c.label ? `<div class="xc-metric-label">${esc2(c.label)}</div>` : ''}
          ${c.value ? `<div class="xc-metric-val">${esc2(c.value)}</div>` : ''}
          ${c.meta  ? `<div class="xc-metric-meta">${esc2(c.meta)}</div>` : ''}
          ${c.cta   ? `<div class="xc-metric-cta">${esc2(c.cta)}</div>` : ''}
        </div>`;
      case 'confirmationOverlay': {
        const rows = (c.rows||[]).map(r =>
          `<div class="xc-conf-row"><span class="xc-conf-k">${esc2(r.label)}</span><span>${esc2(r.value)}</span></div>`
        ).join('');
        return `<div class="xc-conf">
          <div class="xc-conf-title">${esc2(c.title||'Confirm')}</div>
          <div class="xc-conf-rows">${rows}</div>
          <div class="xc-conf-btns">
            ${c.cancelCta ? `<div class="xc-btn xc-btn-ghost">${esc2(c.cancelCta)}</div>` : ''}
            <div class="xc-btn ${c.destructive ? 'xc-btn-dest' : 'xc-btn-primary'}">${esc2(c.confirmCta||'Confirm')}</div>
          </div>
        </div>`;
      }
      case 'warningBanner':
        return `<div class="xc-banner xc-banner-warn">⚠ ${esc2(c.message||'')}</div>`;
      case 'infoBanner':
        return `<div class="xc-banner xc-banner-info">ℹ ${esc2(c.message||'')}</div>`;
      case 'successBanner':
        return `<div class="xc-banner xc-banner-ok">✓ ${esc2(c.message||'')}</div>`;
      case 'recordCard':
        return `<div class="xc-record">
          <div class="xc-record-top">
            ${c.id     ? `<span class="xc-record-id">${esc2(c.id)}</span>` : ''}
            ${c.status ? `<span class="xc-record-status">${esc2(c.status)}</span>` : ''}
          </div>
          ${c.primaryValue ? `<div class="xc-record-primary">${esc2(c.primaryValue)}</div>` : ''}
          ${(c.rows||[]).map(r => `<div class="xc-record-row"><span class="xc-record-label">${esc2(r.label)}</span><span class="xc-record-value">${esc2(r.value)}</span></div>`).join('')}
        </div>`;
      case 'disambiguation':
        return `<div class="xc-disambig">${(c.options||[]).map(o =>
          `<div class="xc-disambig-opt">
            <span class="xc-disambig-key">${esc2(o.key)}</span>
            <div><div class="xc-disambig-label">${esc2(o.label)}</div><div class="xc-disambig-desc">${esc2(o.desc||'')}</div></div>
          </div>`).join('')}</div>`;
      default:
        return `<div class="xc-banner xc-banner-info">${esc2(c.type)}</div>`;
    }
  }

  // ── Derive BEHAVIOUR steps from bot turns ─────────────────────
  function deriveBehaviour(turns) {
    const steps = [];
    turns.forEach(t => {
      if (t.type !== 'bot') return;
      let desc = '';
      const bubbles = t.bubbles || [];
      if (bubbles.length > 0) desc += bubbles[0];
      if (bubbles.length > 1) desc += ` [+${bubbles.length - 1} more bubble${bubbles.length > 2 ? 's' : ''}]`;
      const comps = [t.component, t.component2].filter(Boolean);
      if (comps.length) desc += (desc ? ' — Shows ' : 'Shows ') + comps.map(c => c.type).join(' + ');
      if (t.quickReplies && t.quickReplies.length) desc += (desc ? ' — Offers: ' : 'Offers: ') + t.quickReplies.join(' / ');
      if (desc) steps.push(desc);
    });
    return steps;
  }

  // ── Render one scenario block (spec + conversation) ───────────
  function renderScenarioSection(scenario, turns, onlyWhat) {
    const doSpec = onlyWhat !== 'conversation';
    const doConv = onlyWhat !== 'spec';
    const badgeColors = { happy: '#166534', error: '#991B1B', edge: '#92400E' };
    const badgeColor = badgeColors[scenario.category] || '#666';

    let out = `<div class="scenario-section">
      <div class="scenario-heading">
        <span class="scenario-id">${esc2(scenario.id)}</span>
        <span class="scenario-label">${esc2(scenario.label)}</span>
        <span class="scenario-badge" style="color:${badgeColor}">${esc2(scenario.category)}</span>
      </div>`;

    if (doSpec) {
      const behaviourSteps = deriveBehaviour(turns);
      const guardrails = S.learnedRules && S.learnedRules.length > 0 ? S.learnedRules : null;
      out += `<div class="spec-block">
        <div class="spec-row"><span class="spec-k">TRIGGER</span><span>${esc2(scenario.condition)}</span></div>
        <div class="spec-row"><span class="spec-k">PERSONA</span><span>${esc2(personaText || personaName)}</span></div>
        ${behaviourSteps.length > 0
          ? `<div class="spec-row"><span class="spec-k">BEHAVIOUR</span><ol class="spec-ol">${behaviourSteps.map(s => `<li>${esc2(s)}</li>`).join('')}</ol></div>`
          : ''}
        <div class="spec-row"><span class="spec-k">GUARDRAILS</span>${guardrails
          ? `<ul class="spec-ul">${guardrails.map(r => `<li>${esc2(r)}</li>`).join('')}</ul>`
          : `<span class="spec-placeholder">None captured — use the tweak field to add guardrails</span>`
        }</div>
      </div>`;
    }

    if (doConv) {
      if (turns.length > 0) {
        out += `<div class="conv-wrap">`;
        turns.forEach(t => {
          if (t.type === 'user') {
            out += `<div class="turn user"><div class="bubble user-bubble">${esc2(t.text||'')}</div></div>`;
          } else {
            out += `<div class="turn bot">`;
            (t.bubbles || []).forEach(b => { out += `<div class="bubble bot-bubble">${esc2(b)}</div>`; });
            if (t.component)  out += renderCompExport(t.component);
            if (t.component2) out += renderCompExport(t.component2);
            if (t.quickReplies && t.quickReplies.length) {
              out += `<div class="qr-row">${t.quickReplies.map(q => `<span class="qr">${esc2(q)}</span>`).join('')}</div>`;
            }
            out += `</div>`;
          }
        });
        out += `</div>`;
      } else {
        out += `<div class="no-conv">No conversation generated for this scenario yet.</div>`;
      }
    }

    out += `</div>`;
    return out;
  }

  // ── Build document body ───────────────────────────────────────
  let body = '';
  let hasContent = false;

  // Header
  body += `<div class="doc-header">
    <div class="doc-eyebrow">Chatbot Conversation Designer</div>
    <h1>${esc2(S.submittedIntent || 'Design export')}</h1>
    <div class="doc-meta">Persona: ${esc2(personaName)} &nbsp;·&nbsp; ${S.scenarios.length} scenario${S.scenarios.length !== 1 ? 's' : ''} &nbsp;·&nbsp; Exported ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
  </div>`;

  // Scenario map
  if (sections.map && S.scenarios.length > 0) {
    hasContent = true;
    body += `<section><h2>Scenario map</h2><table><thead><tr><th>ID</th><th>Label</th><th>Category</th><th>Condition</th></tr></thead><tbody>`;
    S.scenarios.forEach(s => {
      const bc = s.category === 'happy' ? '#166534' : s.category === 'error' ? '#991B1B' : '#92400E';
      body += `<tr><td class="mono">${esc2(s.id)}</td><td>${esc2(s.label)}</td><td style="color:${bc};font-weight:600">${esc2(s.category)}</td><td class="muted">${esc2(s.condition)}</td></tr>`;
    });
    body += `</tbody></table></section>`;
  }

  // Conversations and/or specs
  if (sections.conversation || sections.spec) {
    const onlyWhat = sections.conversation && sections.spec ? 'all'
                   : sections.conversation ? 'conversation'
                   : 'spec';

    if (scope === 'all') {
      hasContent = true;
      const heading = onlyWhat === 'all' ? 'Conversations &amp; specs'
                    : onlyWhat === 'conversation' ? 'Conversations'
                    : 'Prompt specs';
      body += `<section><h2>${heading}</h2>`;
      S.scenarios.forEach(scenario => {
        const k = scenario.id + '-' + S.persona;
        body += renderScenarioSection(scenario, S.generatedConvos[k] || [], onlyWhat);
      });
      body += `</section>`;
    } else if (sel) {
      hasContent = true;
      const k = sel.id + '-' + S.persona;
      body += renderScenarioSection(sel, S.generatedConvos[k] || [], onlyWhat);
    }
  }

  // Design rules
  if (sections.rules && S.learnedRules && S.learnedRules.length > 0) {
    hasContent = true;
    body += `<section><h2>Learned from tweaks</h2><ul class="spec-ul">`;
    S.learnedRules.forEach(r => { body += `<li>${esc2(r)}</li>`; });
    body += `</ul></section>`;
  }

  if (!hasContent) {
    body += `<p style="color:#888;padding:32px 0">No content to export for this selection.</p>`;
  }

  // ── Styles ────────────────────────────────────────────────────
  const css = `

// Builds a JSONL string for LLM fine-tuning.
// Each scenario with a generated conversation becomes one training example.
// Format: OpenAI-compatible {"messages":[...]} — one JSON object per line.
// System message = persona instruction + guardrails (global + scenario-scoped rules).
// Assistant turns include text bubbles; UI components are appended as a JSON block
// so the model can learn to output structured UI alongside text.
function buildExportJSONL() {
  const personaText = (S.personaTexts && S.personaTexts[S.persona])
    || (PERSONAS[S.persona] && PERSONAS[S.persona].text) || '';
  const personaName = (S.personaNames && S.personaNames[S.persona])
    || (PERSONAS[S.persona] && PERSONAS[S.persona].name) || S.persona;

  const lines = [];

  S.scenarios.forEach(scenario => {
    const key = scenario.id + '-' + S.persona;
    const turns = S.generatedConvos[key];
    if (!turns || turns.length === 0) return;

    // Build system prompt
    const globalRules = S.learnedRules || [];
    const scenRules = (S.scenarioRules && S.scenarioRules[scenario.id]) || [];
    const allRules = [...globalRules, ...scenRules];
    let systemContent = 'You are ' + personaName + '. ' + personaText;
    systemContent += '\n\nContext: The user intent is "' + S.submittedIntent + '". Scenario: "' + scenario.label + '" (' + scenario.category + '): ' + scenario.condition;
    if (allRules.length > 0) {
      systemContent += '\n\nGuardrails:\n' + allRules.map(r => '- ' + r).join('\n');
    }

    // Build messages array
    const messages = [{ role: 'system', content: systemContent }];

    turns.forEach(t => {
      if (t.type === 'user') {
        messages.push({ role: 'user', content: t.text || '' });
      } else {
        const bubbles = (t.bubbles || []).join('\n');
        const comps = [t.component, t.component2].filter(Boolean);
        const compBlock = comps.length > 0
          ? '\n\n[UI_COMPONENT]\n' + JSON.stringify(comps.length === 1 ? comps[0] : comps, null, 2)
          : '';
        const qrBlock = (t.quickReplies && t.quickReplies.length > 0)
          ? '\n\n[QUICK_REPLIES]\n' + t.quickReplies.join(' | ')
          : '';
        messages.push({ role: 'assistant', content: bubbles + compBlock + qrBlock });
      }
    });

    lines.push(JSON.stringify({ messages }));
  });

  return lines.join('\n');
}


// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
// Selectors of scrollable containers we want to preserve across re-renders
const SCROLL_SELECTORS = ['.step3-main', '.step3-sidebar-inner', '.left-panel-inner', '.mat-body', '.phone-body', '.step2-wrap'];

function render() {
  // Save scroll positions before wiping innerHTML
  const scrollMap = {};
  SCROLL_SELECTORS.forEach(sel => {
    const el = document.querySelector(sel);
    if (el && el.scrollTop > 0) scrollMap[sel] = el.scrollTop;
  });

  const step = S.step;
  let mainContent = '';

  if (step === 1) mainContent = renderStep1Main();
  else if (step === 2) mainContent = renderStep2Main();
  else if (step === 3) mainContent = renderStep3Main();

  const showStep = step !== 'onboarding';

  document.getElementById('app').innerHTML =
    renderTopbar()
    + (showStep ? renderStepBar() : '')
    + (showStep
      ? '<div class="main-layout">' + (step !== 1 ? renderLeftPanel() : '') + '<div class="main-panel">' + mainContent + '</div></div>'
      : '')
    + (step === 'onboarding' ? renderOnboarding() : '')
    + renderMaterials()
    + renderExportPanel();

  // Restore scroll positions after re-render
  SCROLL_SELECTORS.forEach(sel => {
    if (scrollMap[sel] != null) {
      const el = document.querySelector(sel);
      if (el) el.scrollTop = scrollMap[sel];
    }
  });

  // Scroll the keep/discard toast into view whenever it's freshly shown
  if (S.capturedRule) {
    const toastEl = document.querySelector('.tweak-toast');
    if (toastEl) toastEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  attachHandlers();
  saveState();
}

// ═══════════════════════════════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════
function attachHandlers() {
  // Helper: sync both intent textareas and CTA button state without re-render
  function syncIntentUI(val) {
    S.intent = val;
    const left = document.getElementById('intent-input');
    const main = document.getElementById('intent-input-main');
    const cta  = document.getElementById('generate-cta');
    if (left && left !== document.activeElement) left.value = val;
    if (main && main !== document.activeElement) main.value = val;
    if (cta) cta.disabled = !val.trim();
  }

  // Left panel intent textarea
  const intentEl = document.getElementById('intent-input');
  if (intentEl) {
    intentEl.addEventListener('input', e => syncIntentUI(e.target.value));
    intentEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (S.intent.trim()) generateScenarios(S.intent.trim()); }
    });
  }

  // Main canvas intent textarea (Step 1)
  const intentMainEl = document.getElementById('intent-input-main');
  if (intentMainEl) {
    intentMainEl.addEventListener('input', e => syncIntentUI(e.target.value));
  }

  // Tweak textarea live update
  const tweakEl = document.getElementById('tweak-input');
  if (tweakEl) {
    tweakEl.addEventListener('input', e => {
      S.tweak = e.target.value;
      const applyBtn = document.querySelector('[data-action="apply-tweak"]');
      if (applyBtn) applyBtn.disabled = !(S.tweak.trim() && S.selectedScenario);
    });
  }

  // Onboarding inputs
  const domainEl = document.getElementById('onb-domain');
  if (domainEl) {
    domainEl.addEventListener('input', e => { S.onbDomain = e.target.value; });
    domainEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleAction('onb-next'); });
    domainEl.focus();
  }
  const pasteEl = document.getElementById('onb-paste');
  if (pasteEl) pasteEl.addEventListener('input', e => { S.onbGuidelinesPaste = e.target.value; });
  const guidelinesFileEl = document.getElementById('onb-guidelines-file');
  if (guidelinesFileEl) {
    guidelinesFileEl.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => { S.onbGuidelinesPaste = ev.target.result; render(); };
      reader.readAsText(file);
    });
  }
  const designPasteEl = document.getElementById('onb-design-paste');
  if (designPasteEl) {
    designPasteEl.addEventListener('input', e => { S.onbDesignPaste = e.target.value; render(); });
  }
  const designFileEl = document.getElementById('onb-design-file');
  if (designFileEl) {
    designFileEl.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => { S.onbDesignPaste = ev.target.result; render(); };
      reader.readAsText(file);
    });
  }
  // (design URL input removed — replaced with M3/AntX selection)

  // Other materials — multiple file upload in step 3
  const extrasFileEl = document.getElementById('onb-extras-file');
  if (extrasFileEl) {
    extrasFileEl.addEventListener('change', e => {
      const files = Array.from(e.target.files);
      if (!files.length) return;
      if (!S.onbExtras) S.onbExtras = [];
      let pending = files.length;
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          S.onbExtras.push({ name: file.name.replace(/\.[^.]+$/, ''), content: ev.target.result });
          pending--;
          if (pending === 0) render();
        };
        reader.readAsText(file);
      });
      e.target.value = ''; // reset so same file can be re-added after removal
    });
  }

  // Persona name input — live sync without re-render
  const personaNameEl = document.getElementById('persona-name-input');
  if (personaNameEl) {
    personaNameEl.addEventListener('input', e => {
      if (!S.personaNames) S.personaNames = {};
      S.personaNames[S.persona] = e.target.value;
    });
  }

  // Persona textarea — live sync without re-render; mark dirty so scenario clicks don't auto-generate
  const personaTextareaEl = document.getElementById('persona-textarea');
  if (personaTextareaEl) {
    personaTextareaEl.addEventListener('input', e => {
      if (S.personaTexts) S.personaTexts[S.persona] = e.target.value;
      S.personaDirty = true;
    });
  }

  // Scenario editor — label inputs, live sync without re-render
  document.querySelectorAll('.scenario-label-input').forEach(el => {
    el.addEventListener('input', e => {
      const s = S.scenarios.find(x => x.id === e.target.dataset.sid);
      if (s) s.label = e.target.value;
    });
  });
  // Scenario editor — condition textareas, live sync without re-render
  document.querySelectorAll('.scenario-condition-input').forEach(el => {
    el.addEventListener('input', e => {
      const s = S.scenarios.find(x => x.id === e.target.dataset.sid);
      if (s) s.condition = e.target.value;
    });
  });
  // Scenario category select — re-render since badge colour changes
  document.querySelectorAll('select[data-action="set-scenario-cat"]').forEach(el => {
    el.addEventListener('change', e => {
      const s = S.scenarios.find(x => x.id === e.target.dataset.sid);
      if (s) { s.category = e.target.value; render(); }
    });
  });

  // Direct bubble editing — contenteditable bindings
  document.querySelectorAll('.bubble-editable').forEach(el => {
    el.addEventListener('focus', () => {
      // Switch from rendered HTML to raw markdown so user edits ** syntax
      const raw = el.dataset.raw !== undefined ? el.dataset.raw : el.innerText;
      el.innerHTML = esc(raw);
      // Place cursor at end
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); el.blur(); }
    });
    el.addEventListener('blur', () => {
      // Element was detached by a render() call mid-generation — ignore phantom blur
      if (!document.contains(el)) return;
      const key = el.dataset.key;
      const idx = parseInt(el.dataset.idx);
      const field = el.dataset.field;
      const turns = S.generatedConvos[key];
      if (!turns || !turns[idx]) return;
      const newText = el.innerText.replace(/\n$/, ''); // strip trailing newline browsers add to contenteditable
      let changed = false;
      if (field === 'text' && turns[idx].text !== newText) {
        turns[idx].text = newText; changed = true;
      } else if (field === 'bubble') {
        const bidx = parseInt(el.dataset.bidx);
        if (turns[idx].bubbles && turns[idx].bubbles[bidx] !== newText) {
          turns[idx].bubbles[bidx] = newText; changed = true;
        }
      }
      if (changed) { pushConvoHistory(key); render(); } else { render(); }
    });
  });

  // Component field editing — contenteditable bindings
  document.querySelectorAll('.comp-editable').forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); el.blur(); }
    });
    el.addEventListener('blur', () => {
      if (!document.contains(el)) return;
      const { key, idx, slot, field } = el.dataset;
      const turns = S.generatedConvos[key];
      if (!turns || !turns[parseInt(idx)]) return;
      const comp = turns[parseInt(idx)][slot];
      if (!comp) return;
      const val = el.innerText.replace(/\n$/, '');
      if (field === 'row-value') {
        const ri = parseInt(el.dataset.ridx);
        if (comp.rows && comp.rows[ri]) comp.rows[ri].value = val;
      } else if (field === 'opt-label' || field === 'opt-desc') {
        const oi = parseInt(el.dataset.oidx);
        const subfield = field === 'opt-label' ? 'label' : 'desc';
        if (comp.options && comp.options[oi]) comp.options[oi][subfield] = val;
      } else {
        comp[field] = val;
      }
      pushConvoHistory(key);
      render();
    });
  });

  // Persona dropdown
  const personaDropEl = document.getElementById('persona-dropdown');
  if (personaDropEl) {
    personaDropEl.addEventListener('change', e => {
      handleAction('set-persona', {persona: e.target.value});
    });
  }

  // File upload — helper that reads an .md/.txt file into a target textarea
  function wireFileUpload(inputId, targetId, nameId) {
    const fileEl = document.getElementById(inputId);
    if (!fileEl) return;
    fileEl.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = evt => {
        const content = evt.target.result;
        const target = document.getElementById(targetId);
        if (target) {
          target.value = content;
          target.dispatchEvent(new Event('input')); // trigger live-sync listeners
        }
        if (nameId) {
          const nameEl = document.getElementById(nameId);
          if (nameEl && !nameEl.value.trim()) {
            // Auto-populate name from filename, strip extension and dashes
            nameEl.value = file.name.replace(/\.(md|txt)$/i, '').replace(/[-_]/g, ' ');
          }
        }
      };
      reader.readAsText(file);
      fileEl.value = ''; // reset so same file can be re-uploaded
    });
  }
  wireFileUpload('mat-file-upload-new', 'mat-new-content', 'mat-new-name');

  // Load session — file input inside export panel
  const loadSessionEl = document.getElementById('load-session-input');
  if (loadSessionEl) {
    loadSessionEl.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const saved = JSON.parse(ev.target.result);
          if (!saved.version || !saved.scenarios) {
            alert('This doesn\'t look like a valid session file.');
            return;
          }
          if (!confirm('Load this session? Your current design will be replaced.')) return;
          // Write to localStorage so loadState() can pick it up, then reload
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...saved, version: STATE_VERSION }));
          location.reload();
        } catch(err) {
          alert('Could not read the session file. Make sure it\'s a valid .json file.');
        }
      };
      reader.readAsText(file);
      loadSessionEl.value = '';
    });
  }

  // Live-sync KB textareas (materials panel)
  const matNewContent = document.getElementById('mat-new-content');
  if (matNewContent) matNewContent.addEventListener('input', e => { /* value read on save */ });

}

// ═══════════════════════════════════════════════════════════════
// INIT — one-time setup, then first render
// ═══════════════════════════════════════════════════════════════
function init() {
  // Delegated click handler — attached ONCE to #app, survives innerHTML rewrites
  document.getElementById('app').addEventListener('click', e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    handleAction(el.dataset.action, el.dataset);
  });
  // Restore previous session if available; fall back to fresh start
  const restored = loadState();
  if (restored && S.step === 3 && S.selectedScenario) {
    // Resume generation for any conversations not yet completed
    generateAll(S.scenarios, S.persona);
  } else if (!restored) {
    // Fresh start — nothing to do, render will show onboarding
  }
  render();
}

function handleAction(action, data={}) {
  switch(action) {
    case 'generate':
      if (S.intent.trim()) generateScenarios(S.intent.trim());
      break;

    case 'use-example':
      S.intent = data.text || '';
      generateScenarios(S.intent);
      break;

    case 'pick-intent': {
      // Fill the field but don't generate — wait for user to click CTA
      S.intent = data.text || '';
      render();
      // Focus and scroll the main canvas textarea into view
      setTimeout(() => {
        const el = document.getElementById('intent-input-main') || document.getElementById('intent-input');
        if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
      }, 30);
      break;
    }

    case 'see-example': {
      const ex = S.domainIntents || EXAMPLE_INTENTS;
      S.intent = (ex[2] || ex[0] || EXAMPLE_INTENTS[0]).text;
      generateScenarios(S.intent);
      break;
    }

    case 'focus-intent': {
      const el = document.getElementById('intent-input');
      if (el) el.focus();
      break;
    }

    case 'select-scenario': {
      const s = S.scenarios.find(x => x.id === data.sid);
      if (!s) break;
      S.selectedScenario = s;
      if (S.step === 2) {
        render();
      } else {
        S.step = 3;
        render();
        // Don't auto-generate if persona has been changed but not saved yet
        if (!S.personaDirty) generateAll(S.scenarios, S.persona);
      }
      break;
    }

    case 'goto-step': {
      const n = parseInt(data.step);
      if (n === 1) { S.step = 1; render(); }
      else if (n === 2 && S.scenarios.length > 0) { S.step = 2; render(); }
      else if (n === 3 && S.scenarios.length > 0) {
        if (!S.selectedScenario) S.selectedScenario = S.scenarios[0];
        S.step = 3;
        render();
        const key = S.selectedScenario.id + '-' + S.persona;
        generateAll(S.scenarios, S.persona);
      }
      break;
    }

    case 'generate-responses': {
      S.coverageDismissed = true;
      // Sync any remaining DOM input values to state before navigating
      document.querySelectorAll('.scenario-label-input').forEach(el => {
        const s = S.scenarios.find(x => x.id === el.dataset.sid);
        if (s) s.label = el.value;
      });
      document.querySelectorAll('.scenario-condition-input').forEach(el => {
        const s = S.scenarios.find(x => x.id === el.dataset.sid);
        if (s) s.condition = el.value;
      });
      if (S.scenarios.length === 0) break;
      if (!S.selectedScenario || !S.scenarios.find(x => x.id === S.selectedScenario.id)) {
        S.selectedScenario = S.scenarios[0];
      }
      S.step = 3;
      render();
      const key = S.selectedScenario.id + '-' + S.persona;
      generateAll(S.scenarios, S.persona);
      break;
    }

    case 'delete-scenario': {
      S.scenarios = S.scenarios.filter(x => x.id !== data.sid);
      if (S.selectedScenario && S.selectedScenario.id === data.sid) S.selectedScenario = null;
      render();
      break;
    }

    case 'add-scenario': {
      const newId = (function(){
        const maxN = S.scenarios.reduce((m,s)=>{const n=parseInt(s.id.replace(/^S/,''));return isNaN(n)?m:Math.max(m,n);},0);
        return 'S'+(maxN+1);
      })();
      S.scenarios.push({
        id: newId,
        label: 'New scenario',
        category: 'Edge case',
        condition: 'IF ...'
      });
      render();
      setTimeout(() => {
        const newInput = document.querySelector('.scenario-label-input[data-sid="'+newId+'"]');
        if (newInput) { newInput.focus(); newInput.select(); }
      }, 40);
      break;
    }

    case 'save-persona': {
      // personaTexts already live-synced via textarea input listener
      // Clear all cached conversations for this persona so they regenerate fresh
      Object.keys(S.generatedConvos).forEach(k => {
        if (k.endsWith('-' + S.persona)) delete S.generatedConvos[k];
      });
      S.personaDirty = false;
      S.personaSaveToast = true;
      // Pre-populate awaiting keys so spinners show immediately on render
      S.awaitingRegenKeys = new Set(S.scenarios.map(s => s.id + '-' + S.persona));
      render();
      generateAll(S.scenarios, S.persona);
      setTimeout(() => { S.personaSaveToast = false; render(); }, 2400);
      break;
    }

    case 'toggle-persona':
      S.personaOpen = !S.personaOpen;
      render();
      break;

    case 'set-persona': {
      S.persona = data.persona;
      S.personaDirty = true;
      render();
      break;
    }

    case 'apply-tweak':
      if (S.tweak.trim() && S.selectedScenario) applyTweak(S.tweak);
      break;

    case 'keep-rule-all':
      if (S.capturedRule) { S.learnedRules = [...S.learnedRules, S.capturedRule]; S.capturedRule = null; render(); }
      break;
    case 'keep-rule-scenario':
      if (S.capturedRule && S.selectedScenario) {
        const sid = S.selectedScenario.id;
        S.scenarioRules = { ...S.scenarioRules, [sid]: [...(S.scenarioRules[sid] || []), S.capturedRule] };
        S.capturedRule = null; render();
      }
      break;
    case 'discard-rule':
      S.capturedRule = null; render();
      break;
    case 'remove-rule':
      S.learnedRules = S.learnedRules.filter((_,i) => i !== parseInt(data.idx));
      render();
      break;
    case 'remove-scenario-rule': {
      const sid = data.sid; const ridx = parseInt(data.idx);
      if (S.scenarioRules && S.scenarioRules[sid]) {
        const updated = S.scenarioRules[sid].filter((_,i) => i !== ridx);
        S.scenarioRules = { ...S.scenarioRules, [sid]: updated };
        render();
      }
      break;
    }

    case 'add-empty-state':
      S.scenarios = [...S.scenarios, {
        id: (function(){const maxN=S.scenarios.reduce((m,s)=>{const n=parseInt(s.id.replace(/^S/,''));return isNaN(n)?m:Math.max(m,n);},0);return 'S'+(maxN+1);})(),
        label: 'No results found',
        category: 'Empty state',
        condition: 'IF authenticated but no data exists for this intent',
      }];
      S.coverageDismissed = true;
      render();
      break;

    case 'dismiss-coverage':
      S.coverageDismissed = true;
      render();
      break;

    case 'show-materials':
      S.showMaterials = true;
      render();
      break;
    case 'noop':
      break;

    case 'close-materials':
      S.showMaterials = false;
      S.replacingMat = null;
      render();
      break;

    case 'replace-mat':
      S.replacingMat = data.id;
      S.showAddMaterial = false;
      render();
      setTimeout(() => {
        wireFileUpload('replace-mat-file', 'replace-mat-content', null);
        const nameEl = document.getElementById('replace-mat-name');
        if (nameEl) nameEl.focus();
      }, 20);
      break;

    case 'cancel-replace-mat':
      S.replacingMat = null;
      render();
      break;

    case 'confirm-replace-mat': {
      const mat = S.materials.find(m => m.id === data.id);
      if (mat) {
        const nameEl  = document.getElementById('replace-mat-name');
        const contEl  = document.getElementById('replace-mat-content');
        const newName = nameEl ? nameEl.value.trim() : mat.name;
        const newCont = contEl ? contEl.value.trim() : mat.content;
        if (newCont) {
          mat.name    = newName || mat.name;
          mat.content = newCont;
          mat.parsed  = false;
          mat.scenarioContext     = '';
          mat.conversationContext = '';
          S.replacingMat = null;
          render();
          parseMaterial(mat);
        } else {
          if (contEl) contEl.style.borderColor = 'var(--status-high)';
        }
      }
      break;
    }

    case 'remove-mat': {
      const mat = S.materials.find(m => m.id === data.id);
      if (mat) {
        mat.removed = true; // always keep in list so user can re-add from Not applied
      }
      S.replacingMat = null;
      if (S.previewMatId === data.id) S.previewMatId = null;
      render();
      break;
    }

    case 'add-back-mat': {
      const mat = S.materials.find(m => m.id === data.id);
      if (mat) {
        if (mat.id.startsWith('mat-design')) {
          // Deactivate the current DS material
          S.materials.filter(m => m.id.startsWith('mat-design') && m.id !== mat.id)
            .forEach(m => { m.removed = true; });
          // Stage the new DS key — applied to S.onbDesign only on Apply / Apply+Regen
          // so the phone sim theme doesn't change until the user explicitly commits.
          const DS_ID_MAP = { 'mat-design-m3':'m3', 'mat-design-antx':'antx' };
          const newKey = mat.dsKey || DS_ID_MAP[mat.id];
          if (newKey && newKey !== 'custom') S.pendingOnbDesign = newKey;
        }
        mat.removed = false;
        if (!mat.parsed && !mat.parsing) parseMaterial(mat);
        render();
      }
      break;
    }

    case 'show-add-material':
      S.showAddMaterial = true;
      S.replacingMat = null;
      render();
      setTimeout(() => {
        const el = document.getElementById('mat-new-name');
        if (el) el.focus();
      }, 20);
      break;

    case 'cancel-add-material':
      S.showAddMaterial = false;
      render();
      break;

    case 'save-custom-material': {
      const nameEl = document.getElementById('mat-new-name');
      const contentEl = document.getElementById('mat-new-content');
      const name = nameEl ? nameEl.value.trim() : '';
      const content = contentEl ? contentEl.value.trim() : '';
      if (name && content) {
        const newMat = { id: 'mat-' + Date.now(), name, content, parsing: false, parsed: false, scenarioContext: '', conversationContext: '' };
        S.materials = [...S.materials, newMat];
        S.showAddMaterial = false;
        render();
        parseMaterial(newMat);
      } else {
        // Shake the empty field
        if (nameEl && !name) nameEl.style.borderColor = 'var(--status-high)';
        if (contentEl && !content) contentEl.style.borderColor = 'var(--status-high)';
      }
      break;
    }

    case 'preview-mat':
      S.previewMatId = S.previewMatId === data.id ? null : data.id;
      render();
      break;

    case 'apply-and-regen':
      S.showMaterials = false;
      S.replacingMat = null;
      S.showAddMaterial = false;
      // Apply the staged DS theme now — was written in add-back-mat but deferred until here
      // so the phone sim only updates when the user explicitly commits via Apply / Apply+Regen.
      if (S.pendingOnbDesign) {
        S.onbDesign = S.pendingOnbDesign;
        S.pendingOnbDesign = null;
      }
      if (S.step === 3 && S.scenarios.length > 0) {
        // Clear cached conversations and in-progress keys
        Object.keys(S.generatedConvos).forEach(k => delete S.generatedConvos[k]);
        S.generatingKeys.clear();
        S.awaitingRegenKeys = new Set(S.scenarios.map(s => s.id + '-' + S.persona));
        render();
        generateAll(S.scenarios, S.persona);
      } else {
        render();
      }
      break;

    case 'toggle-copy':
      S.showCopyChooser = !S.showCopyChooser;
      render();
      break;

    case 'new-session':
      if (confirm('Start a new session? Your current design will be cleared.')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }
      break;

    case 'save-session': {
      S.savingSession = true;
      render();
      // Brief delay so the "Saving…" label is visible before the download dialog opens
      setTimeout(() => {
        const snapshot = {
          version: STATE_VERSION,
          step: S.step, onbStep: S.onbStep, onbDomain: S.onbDomain,
          onbGuidelines: S.onbGuidelines, onbGuidelinesPaste: S.onbGuidelinesPaste, onbExtras: S.onbExtras || [],
          onbDesign: S.onbDesign, onbDesignUrl: S.onbDesignUrl,
          onbScenarios: S.onbScenarios,
          materials: S.materials.map(m => ({
            id: m.id, name: m.name, content: m.content, isDefault: m.isDefault,
            removed: m.removed, parsed: m.parsed,
            scenarioContext: m.scenarioContext, conversationContext: m.conversationContext,
          })),
          intent: S.intent, submittedIntent: S.submittedIntent,
          scenarios: S.scenarios, selectedScenario: S.selectedScenario,
          persona: S.persona, personaOpen: S.personaOpen,
          generatedConvos: S.generatedConvos,
          learnedRules: S.learnedRules,
          coverageDismissed: S.coverageDismissed,
          personaTexts: S.personaTexts, personaNames: S.personaNames,
          exportScope: S.exportScope, exportSections: S.exportSections,
          savedAt: new Date().toISOString(),
        };
        const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const intentSlug = (S.submittedIntent || 'session').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40);
        a.href = url; a.download = 'chatbot-session-' + intentSlug + '.json';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        S.savingSession = false;
        render();
      }, 120);
      break;
    }

    case 'open-export':
      S.showExportPanel = true;
      render();
      break;

    case 'close-export':
      S.showExportPanel = false;
      render();
      break;

    case 'toggle-export-section':
      if (!S.exportSections) S.exportSections = { conversation: true, spec: true, map: false, rules: false };
      S.exportSections[data.key] = !S.exportSections[data.key];
      render();
      break;

    case 'set-export-scope':
      S.exportScope = data.scope || 'selected';
      render();
      break;

    case 'set-export-format':
      S.exportFormat = data.fmt || 'html';
      render();
      break;

    case 'do-export': {
      const isJSONL = S.exportFormat === 'jsonl';
      const intentSlug = (S.submittedIntent || 'design').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 40);
      const content = isJSONL ? buildExportJSONL() : buildExportHTML(S.exportScope, S.exportSections);
      const mimeType = isJSONL ? 'application/jsonl' : 'text/html';
      const ext = isJSONL ? '.jsonl' : '.html';
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'chatbot-design-' + intentSlug + ext;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      S.showExportPanel = false;
      render();
      break;
    }

    case 'do-copy': {
      const sel = S.selectedScenario;
      const key = sel ? (sel.id+'-'+S.persona) : null;
      const turns = key ? (S.generatedConvos[key]||[]) : [];
      const personaText = (S.personaTexts && S.personaTexts[S.persona]) || (currentPersonas()[S.persona] || {}).text || '';
      const lines = [
        '═══════════════════════════════════════',
        'BOT TRAINING SPEC',
        '═══════════════════════════════════════',
        '',
        'INTENT',
        S.submittedIntent,
        '',
        'SCENARIO   ' + (sel ? sel.id + ' — ' + sel.label : '(none selected)'),
        'CATEGORY   ' + (sel ? sel.category : ''),
        'CONDITION  ' + (sel ? sel.condition : ''),
        '',
        'BOT PERSONA',
        personaText,
        '',
      ];
      if (turns.length > 0) {
        lines.push('IDEAL CONVERSATION', '───────────────────');
        turns.forEach(t => {
          if (t.type === 'user') {
            lines.push('User:  ' + (t.text || ''));
          } else {
            (t.bubbles || []).forEach(b => lines.push('Bot:   ' + b));
            if (t.component) lines.push('Card:  [' + t.component.type + ']');
            if (t.quickReplies && t.quickReplies.length) lines.push('CTAs:  ' + t.quickReplies.join(' · '));
          }
        });
        lines.push('───────────────────', '');
      }
      lines.push('ALL SCENARIOS');
      S.scenarios.forEach(s => lines.push('  ' + s.id + ' [' + s.category + ']  ' + s.label, '     IF: ' + s.condition));
      const text = lines.join('\n');
      const _doCopy = txt => {
        const ta = document.createElement('textarea');
        ta.value = txt;
        ta.setAttribute('readonly', '');
        ta.style.cssText = 'position:absolute;left:-9999px;top:-9999px;font-size:12pt';
        document.body.appendChild(ta);
        ta.select();
        ta.setSelectionRange(0, 99999);
        document.execCommand('copy');
        document.body.removeChild(ta);
      };
      _doCopy(text);
      S.copyDone = true;
      render();
      setTimeout(() => { S.copyDone = false; render(); }, 2000);
      break;
    }

    case 'retry-conv':
      S.convError = null;
      if (S.selectedScenario) generateConversation(S.selectedScenario, S.persona);
      break;

    case 'undo-conv': {
      const key = data.sid + '-' + S.persona;
      const hist = S.convoHistory[key] || [];
      const idx = S.convoHistoryIdx[key] ?? hist.length - 1;
      if (idx > 0) {
        S.convoHistoryIdx[key] = idx - 1;
        S.generatedConvos[key] = cloneConvo(hist[idx - 1]);
        render();
      }
      break;
    }
    case 'redo-conv': {
      const key = data.sid + '-' + S.persona;
      const hist = S.convoHistory[key] || [];
      const idx = S.convoHistoryIdx[key] ?? hist.length - 1;
      if (idx < hist.length - 1) {
        S.convoHistoryIdx[key] = idx + 1;
        S.generatedConvos[key] = cloneConvo(hist[idx + 1]);
        render();
      }
      break;
    }
    case 'remove-bubble': {
      const key = data.key;
      const idx = parseInt(data.idx);
      const bidx = parseInt(data.bidx);
      const turns = S.generatedConvos[key];
      if (!turns || !turns[idx]) break;
      const turn = turns[idx];
      if (turn.type === 'user') {
        // Remove the whole user turn
        S.generatedConvos[key] = turns.filter((_, i) => i !== idx);
      } else {
        turn.bubbles = (turn.bubbles || []).filter((_, i) => i !== bidx);
        // Auto-remove turn if now completely empty
        const isEmpty = !turn.bubbles.length && !turn.component && !turn.component2 && !(turn.quickReplies && turn.quickReplies.length);
        if (isEmpty) S.generatedConvos[key] = turns.filter((_, i) => i !== idx);
      }
      pushConvoHistory(key);
      render();
      break;
    }
    case 'remove-component': {
      const key = data.key;
      const idx = parseInt(data.idx);
      const slot = data.slot; // 'component' or 'component2'
      const turns = S.generatedConvos[key];
      if (!turns || !turns[idx]) break;
      turns[idx][slot] = null;
      // Auto-remove turn if now completely empty
      const t = turns[idx];
      const isEmpty = !(t.bubbles && t.bubbles.length) && !t.component && !t.component2 && !(t.quickReplies && t.quickReplies.length);
      if (isEmpty) S.generatedConvos[key] = turns.filter((_, i) => i !== idx);
      pushConvoHistory(key);
      render();
      break;
    }

    // Onboarding
    case 'onb-next':
      if (S.onbStep === 0) {
        if (!['m3','antx','custom','none'].includes(S.onbDesign)) S.onbDesign = 'm3';
        initDomain(); // early fire — latency hidden behind onboarding steps 1+2
      }
      if (S.onbStep < 2) { S.onbStep++; render(); }
      else { S.step = 1; render(); initDomain(); initMaterials(); } // initMaterials here ensures full paste content is captured
      break;
    case 'onb-back':
      if (S.onbStep > 0) { S.onbStep--; render(); }
      break;
    case 'skip-onb': {
      if (!['m3','antx','custom','none'].includes(S.onbDesign)) S.onbDesign = 'm3';
      S.step = 1;
      render();
      initMaterials(); // always fires at onboarding exit with complete state
      break;
    }
    case 'set-onb-guidelines':
      S.onbGuidelines = data.val;
      render();
      break;
    case 'remove-onb-extra': {
      const idx = parseInt(data.idx);
      if (S.onbExtras && S.onbExtras[idx] !== undefined) {
        S.onbExtras.splice(idx, 1);
        render();
      }
      break;
    }
    case 'set-onb-design':
      S.onbDesign = data.val;
      render();
      break;
  }
}

init();;
</script>
</body>
</html>
